<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KakaoT-Style 메신저 Enterprise v17 - Private Only</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --kakao-nav-bg: #2a2a2a;      
            --kakao-sidebar-bg: #ffffff;  
            --kakao-chat-bg: #bacbd9;     
            --kakao-yellow: #fee500;      
            --text-main: #191919;
            --text-muted: #707070;
            --border-color: #e5e5e5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard Variable", Pretendard, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #eef2f5; }
        
        /* 회원가입 및 로그인 통합 인증 레이어 */
        .auth-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #f5f6f7; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .auth-box {
            width: 380px; background: #fff; padding: 40px 30px;
            border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
        }
        .auth-box h2 { font-size: 1.5rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .auth-box p { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 24px; }
        .auth-form-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .auth-input { 
            width: 100%; padding: 12px 14px; border: 1px solid var(--border-color); 
            border-radius: 6px; font-size: 0.9rem; outline: none; 
        }
        .auth-input:focus { border-color: #aaa; }
        .auth-btn-group { display: flex; flex-direction: column; gap: 8px; }
        .auth-primary-btn { 
            width: 100%; padding: 12px; background-color: var(--kakao-yellow); 
            border: 1px solid #e2cb00; border-radius: 6px; font-weight: bold; 
            cursor: pointer; font-size: 0.9rem; color: #3c1e1e;
        }
        .auth-secondary-btn {
            width: 100%; padding: 12px; background-color: #f1f5f9;
            border: 1px solid var(--border-color); border-radius: 6px; font-weight: 600;
            cursor: pointer; font-size: 0.85rem; color: #475569;
        }

        /* 메인 컨테이너 */
        .app-container { 
            width: 1000px; 
            height: 700px; 
            background-color: #fff; 
            border-radius: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex; 
            overflow: hidden; 
            transition: all 0.3s ease;
        }

        .nav-bar {
            width: 70px;
            background-color: var(--kakao-nav-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 0;
            gap: 28px;
            flex-shrink: 0;
        }
        .nav-item { color: #8e8e8e; font-size: 1.4rem; cursor: pointer; transition: color 0.2s; }
        .nav-item:hover, .nav-item.active { color: #ffffff; }

        .sub-sidebar {
            width: 280px;
            background-color: var(--kakao-sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-title-area { 
            padding: 24px 20px 12px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .sidebar-title-area h3 { font-size: 1.2rem; font-weight: 800; color: var(--text-main); }
        .add-friend-icon { font-size: 1.1rem; color: var(--text-main); cursor: pointer; }
        .add-friend-icon:hover { color: #000; }
        
        .my-profile-card { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border-color); position: relative;}
        .profile-avatar { width: 42px; height: 42px; background: #e2e8f0; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #475569; font-weight: bold; flex-shrink: 0; user-select: none;}
        .my-profile-info { flex: 1; min-width: 0; }
        .my-profile-info h4 { font-size: 0.88rem; font-weight: 700; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .uid-display { font-size: 0.68rem; color: #94a3b8; display: block; margin-top: 1px; cursor: pointer; }
        .uid-display:hover { text-decoration: underline; color: #64748b; }
        .profile-actions { margin-top: 4px; display: flex; gap: 8px; }
        .profile-actions span { font-size: 0.72rem; color: var(--text-muted); cursor: pointer; }
        .profile-actions span:hover { text-decoration: underline; color: #000; }
        
        .logout-btn-text { color: #ef4444 !important; font-weight: 600; }

        .list-scroll-area { flex: 1; overflow-y: auto; padding: 10px 0; }
        .section-divider { font-size: 0.75rem; font-weight: 700; color: #94a3b8; padding: 10px 20px 4px 20px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .list-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; transition: background 0.15s; }
        .list-item:hover { background-color: #f7f7f7; }
        .list-item.active { background-color: #ebebeb; }
        .item-body { flex: 1; min-width: 0; }
        .item-header-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
        .item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-time { font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; }
        .item-preview { font-size: 0.8rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .empty-placeholder { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 0.85rem; line-height: 1.5; }

        .main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--kakao-chat-bg); position: relative; min-width: 0; }
        .view-panel { display: flex; flex-direction: column; width: 100%; height: 100%; }

        .chat-header { background-color: rgba(255,255,255,0.9); backdrop-filter: blur(5px); padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
        .chat-header h2 { font-size: 1rem; font-weight: 700; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .back-btn { display: none; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); padding-right: 4px; }

        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; gap: 8px; max-width: 85%; }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: start; }
        .msg-row.sent .profile-avatar { display: none; } 

        .msg-container { display: flex; flex-direction: column; min-width: 0; }
        .msg-row.sent .msg-container { align-items: flex-end; }
        .msg-username { font-size: 0.75rem; color: #4e4e4e; margin-bottom: 4px; font-weight: 600; }
        
        .msg-bubble-wrap { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.sent .msg-bubble-wrap { flex-direction: row-reverse; }

        .bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.88rem; line-height: 1.4; word-break: break-all; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .msg-row.sent .bubble { background-color: var(--kakao-yellow); color: #000; border-top-right-radius: 0; }
        .msg-row.received .bubble { background-color: #ffffff; color: var(--text-main); border-top-left-radius: 0; }
        .msg-time-stamp { font-size: 0.65rem; color: #556677; flex-shrink: 0; margin-bottom: 2px; }

        .chat-input-area { padding: 16px 20px; background-color: #fff; display: flex; gap: 12px; align-items: center; }
        #message-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 0.9rem; background-color: #f9f9f9; min-width: 0; }
        #message-input:focus { border-color: #bcccd9; background-color: #fff; }
        
        .file-label { color: #555; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        #file-input { display: none; }
        #send-btn { background-color: var(--kakao-yellow); color: #3c1e1e; border: 1px solid #e2cb00; width: 55px; height: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; flex-shrink: 0; }

        .invite-btn { background-color: #4caf50; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; transition: background 0.15s; }
        .invite-btn:hover { background-color: #43a047; }
        .accept-btn { background-color: #0084ff; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; }
        .accept-btn:hover { background-color: #0073e6; }
        .link-btn { background-color: #0084ff; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin-left: 4px;}
        .explode-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: bold; flex-shrink: 0; }

        .admin-header { background-color: #1e293b; color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        .admin-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background-color: #f1f5f9; }
        .admin-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid var(--border-color); }
        .admin-card h4 { font-size: 1rem; color: #0f172a; margin-bottom: 12px; font-weight: 700; display: flex; align-items: center; gap: 8px;}
        .admin-room-list { display: flex; flex-direction: column; gap: 8px; }
        .admin-room-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border-color); }
        
        .admin-pw-flex { display: flex; gap: 10px; align-items: center; margin-top: 10px;}
        .admin-pw-input { padding: 10px 14px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.88rem; outline: none; width: 220px;}
        .admin-pw-btn { background-color: #1e293b; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer;}
        .admin-pw-btn:hover { background-color: #334155; }

        #img-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 1010; justify-content: center; align-items: center; }
        #img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }

        @media (max-width: 768px) {
            body { background: #fff; }
            .app-container { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
            .main-content { display: none !important; }
            .nav-bar { width: 65px; padding: 16px 0; }
            .sub-sidebar { flex: 1; width: auto; border-right: none; }
            .app-container.chat-open .nav-bar { display: none !important; }
            .app-container.chat-open .sub-sidebar { display: none !important; }
            .app-container.chat-open .main-content { display: flex !important; width: 100% !important; }
            .back-btn { display: block !important; }
            .chat-header { padding: 14px 16px; }
            .chat-input-area { padding: 10px 14px; }
        }
    </style>
</head>
<body>

<!-- 사용자 로그인 및 회원가입 인증 화면 오버레이 -->
<div id="auth-overlay-layer" class="auth-overlay">
    <div class="auth-box">
        <h2>KakaoT Messenger</h2>
        <p>서비스 이용을 위해 아이디와 비밀번호를 입력하세요.</p>
        <div class="auth-form-group">
            <input type="text" id="auth-userid-input" class="auth-input" placeholder="계정 아이디 (영어/숫자)">
            <input type="password" id="auth-password-input" class="auth-input" placeholder="비밀번호">
            <input type="text" id="auth-username-input" class="auth-input" placeholder="사용할 닉네임 (회원가입 시에만 입력)" style="display: none;">
        </div>
        <div class="auth-btn-group">
            <button id="auth-main-btn" class="auth-primary-btn" onclick="executeLoginWorkflow()">로그인</button>
            <button id="auth-toggle-btn" class="auth-secondary-btn" onclick="toggleAuthMode(true)">신규 계정 가입하기</button>
        </div>
    </div>
</div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-img" src="" alt="확대">
</div>

<div class="app-container">
    <div class="nav-bar">
        <div class="nav-item active" id="btn-tab-friends" onclick="switchTab('friends')"><i class="fa-solid fa-user"></i></div>
        <div class="nav-item" id="btn-tab-chats" onclick="switchTab('chats')"><i class="fa-solid fa-comment"></i></div>
        <div class="nav-item" id="btn-tab-admin" onclick="verifyAndOpenAdminMode()"><i class="fa-solid fa-gear"></i></div>
    </div>

    <div class="sub-sidebar">
        <div class="sidebar-title-area">
            <h3 id="sidebar-main-title">친구</h3>
            <i class="fa-solid fa-user-plus add-friend-icon" id="add-friend-btn" onclick="searchAndAddFriend()" title="UID로 친구 추가"></i>
        </div>
        <div class="my-profile-card">
            <div class="profile-avatar" id="my-avatar-box">익</div>
            <div class="my-profile-info">
                <h4 id="my-name-display">로딩 중..</h4>
                <span class="uid-display" id="my-uid-display" onclick="copyMyUID()">내 UID 복사</span>
                <div class="profile-actions">
                    <span onclick="changeMyName()">편집</span>
                    <span class="logout-btn-text" onclick="clearSessionLogout()">• 로그아웃</span>
                </div>
            </div>
        </div>
        <div class="list-scroll-area" id="dynamic-list-container"></div>
    </div>

    <div class="main-content">
        <div id="panel-chat-view" class="view-panel">
            <div class="chat-header">
                <div class="chat-header-left">
                    <button class="back-btn" onclick="closeChatMobile()"><i class="fa-solid fa-chevron-left"></i></button>
                    <h2 id="active-room-title">대화방을 선택해 주세요</h2>
                </div>
                <button class="explode-btn" id="header-explode-btn" style="display:none;" onclick="explodeActiveRoom()">🚨 방 폭파 및 강퇴</button>
            </div>
            <div class="chat-messages" id="chat-messages-box"></div>
            <div class="chat-input-area">
                <label for="file-input" class="file-label"><i class="fa-regular fa-plus-square"></i></label>
                <input type="file" id="file-input" accept="image/*" onchange="uploadPhotoPipeline(this)">
                <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="if(event.key==='Enter') sendKakaoMsg()">
                <button id="send-btn" onclick="sendKakaoMsg()">전송</button>
            </div>
        </div>

        <div id="panel-admin-view" class="view-panel" style="display: none;">
            <div class="admin-header">
                <h2><i class="fa-solid fa-shield-cat"></i> 시스템 관리 컨트롤러</h2>
                <button class="explode-btn" style="background:#555;" onclick="closeAdminMode()">대화방 복귀</button>
            </div>
            <div class="admin-body">
                <div class="admin-card">
                    <h4><i class="fa-solid fa-key"></i> 최고 관리자 마스터 비밀번호 관리 (서버 동기화)</h4>
                    <p style="font-size: 0.82rem; color: var(--text-muted);">전체 시스템 공용 마스터 비밀번호를 변경하여 백엔드 DB와 연동합니다. (공백 제외 4자 이상)</p>
                    <div class="admin-pw-flex">
                        <input type="password" id="new-admin-pw" class="admin-pw-input" placeholder="새로운 마스터 암호 입력">
                        <button class="admin-pw-btn" onclick="updateAdminPassword()">비밀번호 전역 변경</button>
                        <button class="admin-pw-btn" style="background-color: #64748b;" onclick="resetAdminPassword()">초기화(1234)</button>
                    </div>
                </div>

                <div class="admin-card">
                    <h4><i class="fa-solid fa-skull-crossbones"></i> 서버 인프라 세션 강제 셧다운</h4>
                    <div class="admin-room-list" id="admin-raw-rooms"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g",
        databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
        projectId: "my-team-chat-2712e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const DEFAULT_ADMIN_HASH = "03ac674216f3e15c761ee1a5e255f067953623c8b388b4459e13f978d7c846f4"; 

    let myId = localStorage.getItem('chat_userid_v4') || "";
    let myName = localStorage.getItem('chat_username_v4') || "";
    let isRegisterMode = false;

    let currentRoomId = "";
    let currentRoomTitle = "";
    let isAdminAuthenticated = false; 
    
    let activeTab = "friends"; 
    let msgListener = null;
    let relationshipListener = null;
    let roomsListener = null;
    let activeRoomCheckListener = null;
    
    let metaListeners = {};
    let roomMetaCache = {};

    async function computeSHA256(message) {
        const msgBuffer = new TextEncoder().encode(message);                    
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    function copyMyUID() {
        if(!myId) return;
        navigator.clipboard.writeText(myId).then(() => {
            alert("📋 내 고유식별코드(UID)가 복사되었습니다. 상대방에게 공유하여 친구를 맺으세요!");
        });
    }

    function toggleAuthMode(toRegister) {
        isRegisterMode = toRegister;
        const nameInput = document.getElementById('auth-username-input');
        const mainBtn = document.getElementById('auth-main-btn');
        const toggleBtn = document.getElementById('auth-toggle-btn');
        
        if (toRegister) {
            nameInput.style.display = 'block';
            mainBtn.innerText = '회원가입 및 로그인';
            toggleBtn.innerText = '이미 계정이 있으신가요? 로그인하기';
            toggleBtn.setAttribute('onclick', 'toggleAuthMode(false)');
        } else {
            nameInput.style.display = 'none';
            mainBtn.innerText = '로그인';
            toggleBtn.innerText = '신규 계정 가입하기';
            toggleBtn.setAttribute('onclick', 'toggleAuthMode(true)');
        }
    }

    async function executeLoginWorkflow() {
        const idInput = document.getElementById('auth-userid-input').value.trim();
        const pwInput = document.getElementById('auth-password-input').value.trim();
        const nameInput = document.getElementById('auth-username-input').value.trim();

        if (!idInput || !pwInput) {
            return alert("아이디와 비밀번호를 모두 입력해 주세요.");
        }
        
        const idRegex = /^[a-zA-Z0-9_\-]+$/;
        if (!idRegex.test(idInput)) {
            return alert("아이디는 영문, 숫자, 하이픈(-), 언더바(_)만 사용할 수 있습니다.");
        }

        const hashedPw = await computeSHA256(pwInput);
        const userRef = database.ref(`kakao_style/users/${idInput}`);
        const userSnap = await userRef.once('value');

        if (isRegisterMode) {
            if (userSnap.exists()) {
                return alert("이미 존재하는 아이디입니다. 다른 아이디를 사용해 주세요.");
            }
            if (!nameInput) {
                return alert("채팅방에서 표시될 닉네임을 입력해 주세요.");
            }
            
            const userData = {
                id: idInput,
                name: nameInput,
                passwordHash: hashedPw,
                lastSeen: Date.now()
            };
            
            await userRef.set(userData);
            myId = idInput;
            myName = nameInput;
        } else {
            if (!userSnap.exists()) {
                return alert("존재하지 않는 아이디입니다. 회원가입을 먼저 진행해 주세요.");
            }
            
            const dbUser = userSnap.val();
            if (dbUser.passwordHash !== hashedPw) {
                return alert("비밀번호가 일치하지 않습니다. 다시 확인해 주세요.");
            }
            
            myId = dbUser.id;
            myName = dbUser.name;
            await userRef.update({ lastSeen: Date.now() });
        }

        localStorage.setItem('chat_userid_v4', myId);
        localStorage.setItem('chat_username_v4', myName);
        
        document.getElementById('auth-overlay-layer').style.display = 'none';
        initApplication();
    }

    async function initApplication() {
        if (!myId || !myName) {
            document.getElementById('auth-overlay-layer').style.display = 'flex';
            toggleAuthMode(false);
            return;
        }
        
        document.getElementById('auth-overlay-layer').style.display = 'none';
        document.getElementById('my-name-display').innerText = myName;
        document.getElementById('my-avatar-box').innerText = myName.substring(0, 1);
        document.getElementById('my-uid-display').innerText = `ID: ${myId}`;

        const adminHashSnap = await database.ref('kakao_style/system_config/admin_hash').once('value');
        if (!adminHashSnap.exists()) {
            await database.ref('kakao_style/system_config').set({ admin_hash: DEFAULT_ADMIN_HASH });
        }

        const urlParams = new URLSearchParams(window.location.search);
        const invitedRoomId = urlParams.get('room');

        if (invitedRoomId) {
            alert("💌 초대 링크를 통해 대화방에 연결 중입니다. 보안 비밀번호를 검증합니다.");
            const targetRoomMeta = await database.ref(`kakao_style/rooms/${invitedRoomId}/meta`).once('value');
            
            if (targetRoomMeta.exists()) {
                const roomInfo = targetRoomMeta.val();
                const userPass = prompt("이 대화방의 비밀번호를 입력하세요:");
                
                if (userPass) {
                    const hashedUserPass = await computeSHA256(userPass);
                    if (hashedUserPass === roomInfo.passwordHash) {
                        await database.ref(`kakao_style/user_rooms/${myId}/${invitedRoomId}`).set({
                            roomId: invitedRoomId,
                            roomTitle: roomInfo.title
                        });
                        window.history.replaceState({}, document.title, window.location.pathname);
                        switchTab('chats');
                        joinChatRoom(invitedRoomId, roomInfo.title);
                        return;
                    } else {
                        alert("보안 오류: 비밀번호가 일치하지 않습니다.");
                    }
                }
            } else {
                alert("존재하지 않거나 파괴된 대화방 링크입니다.");
            }
        }
        
        switchTab(activeTab); 
    }

    function clearSessionLogout() {
        if(confirm("🔒 로그아웃하시겠습니까?")) {

            localStorage.removeItem('chat_username_v4');

    function switchTab(tabName) {

        activeTab = tabName;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const activeNavBtn = document.getElementById(`btn-tab-${tabName}`);

        closeChatMobile();
        if(relationshipListener) relationshipListener.off();

        roomMetaCache = {};

    async function searchAndAddFriend() {
        const targetUid = prompt("추가하고자 하는 상대방의 고유 식별코드(UID/아이디)를 입력하세요:");
        if(!targetUid || !targetUid.trim()) return;
        
        const cleanUid = targetUid.trim();
        if(cleanUid === myId) return alert("본인은 친구로 추가할 수 없습니다.");

        const userSnap = await database.ref(`kakao_style/users/${cleanUid}`).once('value');
        if(!userSnap.exists()) {
            return alert("존재하지 않는 사용자 식별코드입니다. ID를 다시 확인해 주세요.");
        }
        
        const targetUser = userSnap.val();

        const relationSnap = await database.ref(`kakao_style/friends_relations/${myId}/${cleanUid}`).once('value');
        if(relationSnap.exists()) {
            const relType = relationSnap.val().status;
            if(relType === 'accepted') return alert("이미 친구 목록에 등록된 사용자입니다.");
            if(relType === 'requested') return alert("이미 친구 요청을 발송했습니다. 상대방의 승인을 기다려주세요.");
        }

        const batch = {};
        batch[`kakao_style/friends_relations/${myId}/${cleanUid}`] = { status: 'requested', name: targetUser.name };
        batch[`kakao_style/friends_relations/${cleanUid}/${myId}`] = { status: 'received', name: myName };
        
        database.ref().update(batch).then(() => {
            alert(`${targetUser.name}님에게 친구 요청을 발송했습니다! 상대방이 승인하면 목록에 표시됩니다.`);
        });
    }

                    reqItem.innerHTML = `
                        <div style="display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1;">
                            <div class="profile-avatar" style="background:#cbd5e1; color:#fff;">?</div>

                                <div class="item-name">${safeName}</div>

        batch[`kakao_style/friends_relations/${myId}/${targetUid}/status`] = 'accepted';
        batch[`kakao_style/friends_relations/${targetUid}/${myId}/status`] = 'accepted';

        database.ref().update(batch).then(() => {
            alert(`🎉 ${targetName}님과 친구가 되었습니다. 이제 비밀 대화방을 생성할 수 있습니다.`);

    async function createNewSecureRoom(targetUid, targetUname) {
        const roomPass = prompt("이 방에 적용할 암호화 비밀번호를 설정하세요:");
        if (!roomPass || !roomPass.trim()) return alert("비밀번호는 필수입니다.");

        const hashedRoomPass = await computeSHA256(roomPass.trim());
        const secureRoomId = "room_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
        const roomTitle = `${targetUname}님과의 보안 대화방`;

        const now = Date.now();
        const timeString = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });

        const batch = {};
        batch[`kakao_style/user_rooms/${myId}/${secureRoomId}`] = { roomId: secureRoomId, roomTitle: roomTitle };
        batch[`kakao_style/rooms/${secureRoomId}/meta`] = {
            title: roomTitle,
            lastMessage: "보안 채널이 생성되었습니다.",
            lastTime: timeString,
            timestamp: now,
            passwordHash: hashedRoomPass,
            creatorId: myId
        };

        database.ref().update(batch).then(() => {
            database.ref(`kakao_style/rooms/${secureRoomId}/messages`).push({
                senderId: "system", senderName: "시스템", text: `🔒 비밀번호 보안방이 정상 생성되었습니다.`, time: timeString, timestamp: now
            });
            switchTab('chats');
            joinChatRoom(secureRoomId, roomTitle);
        });
    }

    function loadChatsTab(container) {
        roomsListener = database.ref(`kakao_style/user_rooms/${myId}`);
        roomsListener.on('value', (snapshot) => {
            const myRooms = snapshot.val() || {};
            const roomIds = Object.keys(myRooms);

            if(roomIds.length === 0) {
                container.innerHTML = '<div class="empty-placeholder">참여 중인 대화방이 없습니다.</div>';
                return;
            }

            roomIds.forEach(rId => {
                if(!metaListeners[rId]) {
                    metaListeners[rId] = database.ref(`kakao_style/rooms/${rId}/meta`);
                    metaListeners[rId].on('value', (metaSnap) => {
                        const mData = metaSnap.val();
                        roomMetaCache[rId] = mData || { lastMessage: "대화 기록 없음", lastTime: "", timestamp: 0 };
                        renderSortedChats(container, myRooms);
                    });
                }
            });
        });
    }

    function renderSortedChats(container, myRooms) {
        container.innerHTML = '';
        const sortedList = Object.keys(myRooms).map(rId => ({
            id: rId,
            title: myRooms[rId].roomTitle,
            meta: roomMetaCache[rId] || { lastMessage: "대화 기록 없음", lastTime: "", timestamp: 0 }
        })).sort((a, b) => b.meta.timestamp - a.meta.timestamp);

        if(sortedList.length === 0) {
            container.innerHTML = '<div class="empty-placeholder">참여 중인 대화방이 없습니다.</div>';
            return;
        }

        sortedList.forEach(room => {
            const item = document.createElement('div');
            item.className = `list-item ${currentRoomId === room.id ? 'active' : ''}`;
            const safeTitle = escapeHtml(room.title);
            const safeMsg = escapeHtml(room.meta.lastMessage);
            const safeTime = escapeHtml(room.meta.lastTime);

            item.innerHTML = `
                <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
                    <div class="profile-avatar" style="background:#bcccd9;"><i class="fa-regular fa-comment"></i></div>
                    <div class="item-body">
                        <div class="item-header-line">
                            <span class="item-name">${safeTitle}</span>
                            <span class="item-time">${safeTime}</span>
                        </div>
                        <div class="item-preview">${safeMsg}</div>
                    </div>
                </div>
                <button class="link-btn" id="link-btn-${room.id}"><i class="fa-solid fa-share-nodes"></i> 초대장</button>
            `;
            
            item.onclick = () => joinChatRoom(room.id, room.title);
            
            const lBtn = item.querySelector(`#link-btn-${room.id}`);
            if(lBtn) {
                lBtn.onclick = (e) => {
                    e.stopPropagation();
                    copyInvitationLink(room.id);
                };
            }
            container.appendChild(item);
        });
    }

    function copyInvitationLink(roomId) {
        const inviteUrl = window.location.origin + window.location.pathname + "?room=" + roomId;
        navigator.clipboard.writeText(inviteUrl).then(() => {
            alert("📋 초대 링크가 카피되었습니다.");
        }).catch(() => {
            prompt("초대 링크 수동 복사:", inviteUrl);
        });
    }

    function joinChatRoom(roomId, roomTitle) {
        if(msgListener) msgListener.off();
        if(activeRoomCheckListener) activeRoomCheckListener.off();
        
        currentRoomId = roomId;
        currentRoomTitle = roomTitle;

        document.getElementById('active-room-title').innerText = roomTitle;
        const msgBox = document.getElementById('chat-messages-box');
        msgBox.innerHTML = '';
        document.querySelector('.app-container').classList.add('chat-open');

        const explodeBtn = document.getElementById('header-explode-btn');
        explodeBtn.style.display = 'none';

        activeRoomCheckListener = database.ref(`kakao_style/rooms/${roomId}/meta`);
        activeRoomCheckListener.on('value', (snapshot) => {
            const meta = snapshot.val();
            
            if (!snapshot.exists()) {
                database.ref(`kakao_style/user_rooms/${myId}/${roomId}`).remove();
                alert("🚨 대화방이 존재하지 않거나 강퇴되었습니다.");
                currentRoomId = "";
                document.getElementById('active-room-title').innerText = "대화방을 선택해 주세요";
                if (activeTab === 'chats') switchTab('chats');
                return;
            }

            if (meta && meta.creatorId === myId) {
                explodeBtn.style.display = 'block';
            }
        });

        msgListener = database.ref(`kakao_style/rooms/${roomId}/messages`).limitToLast(40);
        msgListener.on('child_added', (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            renderKakaoBubble(data.senderName, data.text, data.senderId === myId ? 'sent' : 'received', data.time, data.fileData, data.fileName);
        });
    }

    function explodeActiveRoom() {
        if (!currentRoomId) return;
        
        if (confirm("🚨 정말로 이 채팅방을 파괴하겠습니까?")) {
            const targetExplodeId = currentRoomId;
            
            database.ref(`kakao_style/user_rooms`).once('value', (snapshot) => {
                const usersRoomsData = snapshot.val() || {};
                const updateBatch = {};
                
                Object.keys(usersRoomsData).forEach(uId => {
                    if (usersRoomsData[uId] && usersRoomsData[uId][targetExplodeId]) {
                        updateBatch[`kakao_style/user_rooms/${uId}/${targetExplodeId}`] = null;
                    }
                });

                updateBatch[`kakao_style/rooms/${targetExplodeId}`] = null;

                database.ref().update(updateBatch).then(() => {
                    alert("💥 대화방이 폭파되었습니다.");
                });
            });
        }
    }

    function sendKakaoMsg() {
        const input = document.getElementById('message-input');
        const val = input.value.trim();
        if(!val || !currentRoomId) return;

        const now = Date.now();
        const timeString = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
        const msgPayload = { senderId: myId, senderName: myName, text: val, time: timeString, timestamp: now };
        
        database.ref(`kakao_style/rooms/${currentRoomId}/messages`).push(msgPayload);
        database.ref(`kakao_style/rooms/${currentRoomId}/meta`).update({ lastMessage: val, lastTime: timeString, timestamp: now });
        input.value = '';
    }

    function uploadPhotoPipeline(input) {
        const file = input.files[0];
        if(!file || !currentRoomId) return;

        if (!file.type.startsWith('image/')) {
            alert("오직 이미지 포맷만 업로드 가능합니다.");
            input.value = '';
            return;
        }

        const label = document.querySelector('.file-label');
        label.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            
            img.onerror = () => {
                alert("비정상적인 이미지 파일입니다.");
                label.innerHTML = `<i class="fa-regular fa-plus-square"></i>`;
                input.value = '';
            };

            img.onload = () => {
                const canvas = document.createElement('canvas');
                const MAX_WIDTH = 500; 
                let width = img.width;
                let height = img.height;

                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.5); 
                const now = Date.now();
                const timeString = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
                
                database.ref(`kakao_style/rooms/${currentRoomId}/messages`).push({
                    senderId: myId, senderName: myName, text: "📎 사진 전송", fileData: compressedDataUrl, fileName: file.name, time: timeString, timestamp: now
                });
                database.ref(`kakao_style/rooms/${currentRoomId}/meta`).update({ lastMessage: "📎 사진을 공유했습니다.", lastTime: timeString, timestamp: now });
                
                label.innerHTML = `<i class="fa-regular fa-plus-square"></i>`;
                input.value = '';
            };
        };
        reader.readAsDataURL(file);
    }

    function renderKakaoBubble(senderName, text, type, time, fileData, fileName) {
        const msgBox = document.getElementById('chat-messages-box');
        const row = document.createElement('div');
        row.className = `msg-row ${type}`;

        const safeName = escapeHtml(senderName);
        const safeText = escapeHtml(text);
        const safeTime = escapeHtml(time);

        let initials = safeName.substring(0, 1);
        let html = `<div class="profile-avatar">${initials}</div>`;
        html += `<div class="msg-container">`;
        if(type === 'received') html += `<span class="msg-username">${safeName}</span>`;
        html += `<div class="msg-bubble-wrap"><div class="bubble">`;
        
        if(fileData) {
            html += `
                <div class="img-card">
                    <img src="${fileData}" class="chat-img" style="max-width:100%; border-radius:6px;" onload="scrollChatBottom()" onclick="zoomImg('${fileData}')" alt="이미지">
                    <a href="${fileData}" download="${escapeHtml(fileName) || 'download.jpg'}" class="download-link" style="display:block; font-size:0.75rem; margin-top:4px; color:#0084ff;"><i class="fa-solid fa-download"></i> 다운로드</a>
                </div>`;
        } else {
            html += safeText;
        }
        html += `</div><span class="msg-time-stamp">${safeTime}</span></div></div>`;
        row.innerHTML = html;
        msgBox.appendChild(row);
        scrollChatBottom();
    }

        const target = prompt("새로운 닉네임을 입력하세요 (공백 제외 2~10자):", myName);
        if(!target || !target.trim()) return;
        
        const cleanName = target.trim();

    async function verifyAndOpenAdminMode() {

        if(!pass) return;

        const hashedInput = await computeSHA256(pass);
        const adminConfigSnap = await database.ref('kakao_style/system_config/admin_hash').once('value');
        const currentServerAdminHash = adminConfigSnap.exists() ? adminConfigSnap.val() : DEFAULT_ADMIN_HASH;

        if(hashedInput !== currentServerAdminHash) {
            alert("🚨 권한 경고: 인가되지 않은 인증 요청입니다. (접속 실패)");
            isAdminAuthenticated = false;
            return;

        isAdminAuthenticated = true;
        activeTab = 'admin';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('btn-tab-admin').classList.add('active');

        document.getElementById('panel-chat-view').style.display = 'none';
        document.getElementById('panel-admin-view').style.display = 'flex';
        
        loadAdminInfrastructure();

                const item = document.createElement('div');
                item.className = 'admin-room-item';
                item.innerHTML = `<span>UID: <b>${escapeHtml(id)}</b></span><button class="explode-btn" id="explode-btn-${id}">삭제</button>`;
                item.querySelector(`#explode-btn-${id}`).onclick = () => systemExplodeRoom(id);
                box.appendChild(item);
            });
        });
    }

    async function updateAdminPassword() {
        if (!isAdminAuthenticated) return alert("인증 세션이 만료되었습니다.");
        
        const pwInput = document.getElementById('new-admin-pw');
        const rawPassword = pwInput.value.trim();

        if (rawPassword.length < 4) {
            alert("보안 가이드라인: 최소 4자 이상의 패스워드를 지정해야 합니다.");
            return;
        }

        const newHashString = await computeSHA256(rawPassword);
        
        database.ref('kakao_style/system_config').update({ admin_hash: newHashString })
        .then(() => {
            alert("🔒 [서버 동기화 완료] 전역 마스터 암호가 성공적으로 업데이트되었습니다.\n다음 진입 시점부터 본 암호가 적용됩니다.");
            pwInput.value = '';
            closeAdminMode();
        })
        .catch(err => alert("데이터베이스 쓰기 권한 오류 발생: " + err.message));
    }

    function resetAdminPassword() {
        if (!isAdminAuthenticated) return alert("인증 세션이 만료되었습니다.");
        if (confirm("서버의 마스터 비밀번호를 초기 공장 상태('1234')로 완전히 리셋하시겠습니까?")) {
            database.ref('kakao_style/system_config').update({ admin_hash: DEFAULT_ADMIN_HASH })
            .then(() => {
                alert("⚙️ 전역 마스터 패스워드가 '1234' 해시로 복구되었습니다.");
                document.getElementById('new-admin-pw').value = '';
                closeAdminMode();
            });
        }
    }

    function closeAdminMode() {
        isAdminAuthenticated = false; 
        document.getElementById('panel-admin-view').style.display = 'none';
        document.getElementById('panel-chat-view').style.display = 'flex';
        switchTab('friends');
    }

    function systemExplodeRoom(id) {
        if (!isAdminAuthenticated) return alert("권한이 없습니다.");
        if(confirm("이 방의 모든 인프라 세션을 셧다운하시겠습니까?")) {
            database.ref(`kakao_style/rooms/${id}`).remove().then(() => {
                loadAdminInfrastructure();
            });
        }
    }

    window.onload = initApplication;
</script>
</body>
</html>
