<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 팀 메신저 (초간편 파일 전송)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f2f5; }
        .chat-container { width: 450px; height: 600px; background-color: white; border-radius: 12px; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; overflow: hidden; }
        .chat-header { background-color: #4f46e5; color: white; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
        .chat-header.admin-mode { background-color: #dc2626; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .header-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; background: rgba(255,255,255,0.15); padding: 6px 10px; border-radius: 6px; }
        .change-btn { background: rgba(255,255,255,0.3); border: none; color: white; padding: 2px 6px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .change-btn:hover { background: rgba(255,255,255,0.5); }
        .chat-messages { flex: 1; padding: 16px; overflow-y: auto; background-color: #f8fafc; display: flex; flex-direction: column; gap: 12px; }
        
        /* 메시지 스타일 */
        .message-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }
        .message-sender { font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #64748b; }
        .message { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; word-break: break-all; }
        .message.sent { background-color: #4f46e5; color: white; border-bottom-right-radius: 2px; }
        .message.received { background-color: #e2e8f0; color: #1e293b; border-bottom-left-radius: 2px; }
        .message-time { font-size: 0.65rem; color: #94a3b8; margin-top: 2px; }
        
        /* 파일/이미지 첨부 스타일 */
        .chat-img { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; max-height: 200px; object-fit: cover; }
        .file-link { color: #4f46e5; text-decoration: underline; font-weight: bold; display: inline-block; margin-top: 4px; cursor: pointer; }
        .message.sent .file-link { color: #ffff00; }

        /* 관리자 스타일 */
        .admin-title { font-weight: bold; font-size: 1rem; color: #1e293b; margin-bottom: 10px; border-bottom: 2px solid #e2e8f0; padding-bottom: 6px; }
        .room-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 12px; border-radius: 8px; border: 1px solid #e2e8f0; margin-bottom: 8px; }
        .room-name { font-weight: 600; color: #334155; font-size: 0.95rem; }
        .room-delete-btn { background-color: #ef4444; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        
        /* 입력 영역 */
        .chat-input-area { padding: 16px; background-color: white; border-top: 1px solid #e2e8f0; display: flex; gap: 8px; align-items: center; }
        #message-input { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        .file-label { background-color: #e2e8f0; color: #475569; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; user-select: none; }
        .file-label:hover { background-color: #cbd5e1; }
        #file-input { display: none; }
        #send-btn { background-color: #4f46e5; color: white; border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
        #send-btn.admin-btn { background-color: #dc2626; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header" id="chat-header">
        <div class="header-top">
            <h2 id="room-display">🚪 방 로딩 중...</h2>
            <button class="change-btn" onclick="changeRoom()">방 변경</button>
        </div>
        <div class="header-bottom">
            <span>내 이름: <b id="user-display"></b></span>
            <button class="change-btn" onclick="changeName()">이름 변경</button>
        </div>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
        <label for="file-input" class="file-label" id="file-label">📎</label>
        <input type="file" id="file-input" onchange="handleFileSelect(this)">
        
        <input type="text" id="message-input" placeholder="메시지를 입력하세요..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="handleActionButton()">전송</button>
    </div>
</div>

<!-- Firebase SDK 로드 -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g",
        databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
        projectId: "my-team-chat-2712e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const ADMIN_PASSWORD = "1234";
    let myName = localStorage.getItem('chat_username');
    let currentRoom = localStorage.getItem('chat_roomname');
    let messageListener = null;
    let roomsListener = null;
    let isAdminMode = false;

    function initChat() {
        if (!myName) {
            myName = prompt("메신저에서 사용할 이름을 입력해주세요:") || "익명" + Math.floor(Math.random() * 1000);
            localStorage.setItem('chat_username', myName);
        }
        document.getElementById('user-display').innerText = myName;

        if (!currentRoom) {
            currentRoom = "기본방";
            localStorage.setItem('chat_roomname', currentRoom);
        }

        if (currentRoom === "시스템관리자") {
            enterAdminMode();
        } else {
            document.getElementById('room-display').innerText = "💬 " + currentRoom;
            loadMessages();
        }
    }

    const chatMessages = document.getElementById('chat-messages');
    const messageInput = document.getElementById('message-input');
    const chatHeader = document.getElementById('chat-header');
    const sendBtn = document.getElementById('send-btn');
    const fileLabel = document.getElementById('file-label');

    function loadMessages() {
        isAdminMode = false;
        chatHeader.classList.remove('admin-mode');
        sendBtn.classList.remove('admin-btn');
        sendBtn.innerText = "전송";
        messageInput.placeholder = "메시지를 입력하세요...";
        fileLabel.style.display = "block";

        if (messageListener) database.ref('rooms/' + currentRoom).off();
        if (roomsListener) database.ref('rooms').off();
        
        chatMessages.innerHTML = '';

        messageListener = database.ref('rooms/' + currentRoom).limitToLast(30);
        messageListener.on('child_added', (snapshot) => {
            const data = snapshot.val();
            if(!data || !data.sender) return;
            
            const isMe = data.sender === myName;
            const timeString = new Date(data.timestamp).toLocaleTimeString('ko-KR', {
                hour: '2-digit', minute: '2-digit', hour12: true
            });

            appendMessage(data.sender, data.text, isMe ? 'sent' : 'received', timeString, data.fileData, data.fileType, data.fileName);
            autoScroll();
        });
    }

    // 파일을 안전하게 문자열(Base64)로 변환하여 DB에 바로 저장하는 함수
    function handleFileSelect(input) {
        const file = input.files[0];
        if (!file) return;

        // 무료 요금제 DB 제한을 고려하여 1MB 이하 파일만 권장합니다.
        if (file.size > 1024 * 1024) {
            alert("무료 버전 안정성을 위해 1MB 이하의 파일만 전송 가능합니다.");
            input.value = "";
            return;
        }

        fileLabel.innerText = "⏳";
        const reader = new FileReader();
        
        reader.onload = function(e) {
            const base64Data = e.target.result; // 변환된 파일 텍스트 데이터
            
            database.ref('rooms/' + currentRoom).push({
                sender: myName,
                text: `📎 파일 전송됨`,
                fileName: file.name,
                fileData: base64Data,
                fileType: file.type,
                timestamp: Date.now()
            });
            
            fileLabel.innerText = "📎";
            input.value = "";
        };
        
        reader.readAsDataURL(file);
    }

    function enterAdminMode() {
        isAdminMode = true;
        currentRoom = "시스템관리자";
        localStorage.setItem('chat_roomname', currentRoom);

        chatHeader.classList.add('admin-mode');
        sendBtn.classList.add('admin-btn');
        document.getElementById('room-display').innerText = "🛠️ 관리자 대시보드";
        sendBtn.innerText = "방 생성";
        messageInput.placeholder = "생성할 새 방 이름을 입력하세요...";
        fileLabel.style.display = "none";

        if (messageListener) database.ref('rooms/' + currentRoom).off();
        if (roomsListener) database.ref('rooms').off();

        chatMessages.innerHTML = '<div class="admin-title">📋 개설된 전체 채팅방 목록</div>';

        roomsListener = database.ref('rooms');
        roomsListener.on('value', (snapshot) => {
            chatMessages.innerHTML = '<div class="admin-title">📋 개설된 전체 채팅방 목록</div>';
            const roomsData = snapshot.val();
            if (!roomsData) {
                chatMessages.innerHTML += '<p style="text-align:center; color:#94a3b8; margin-top:20px;">개설된 방이 없습니다.</p>';
                return;
            }

            Object.keys(roomsData).forEach(roomName => {
                if (roomName === "시스템관리자") return;

                const roomItem = document.createElement('div');
                roomItem.classList.add('room-item');

                const nameSpan = document.createElement('span');
                nameSpan.classList.add('room-name');
                nameSpan.innerText = "💬 " + roomName;
                nameSpan.style.cursor = "pointer";
                nameSpan.onclick = () => {
                    currentRoom = roomName;
                    localStorage.setItem('chat_roomname', currentRoom);
                    loadMessages();
                };

                const delBtn = document.createElement('button');
                delBtn.classList.add('room-delete-btn');
                delBtn.innerText = "폭파";
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (confirm(`[${roomName}] 방을 폭파하시겠습니까?`)) {
                        database.ref('rooms/' + roomName).remove();
                    }
                };

                roomItem.appendChild(nameSpan);
                roomItem.appendChild(delBtn);
                chatMessages.appendChild(roomItem);
            });
        });
    }

    function handleActionButton() {
        const inputVal = messageInput.value.trim();
        if (inputVal === '') return;

        if (isAdminMode) {
            database.ref('rooms/' + inputVal).push({
                sender: "시스템",
                text: `✨ [${inputVal}] 방이 관리자에 의해 개설되었습니다.`,
                timestamp: Date.now()
            });
            alert(`[${inputVal}] 방이 생성되었습니다.`);
        } else {
            database.ref('rooms/' + currentRoom).push({
                sender: myName,
                text: inputVal,
                timestamp: Date.now()
            });
        }
        messageInput.value = '';
    }

    function appendMessage(sender, text, type, time, fileData, fileType, fileName) {
        const wrapper = document.createElement('div');
        wrapper.classList.add('message-wrapper', type);

        const senderSpan = document.createElement('span');
        senderSpan.classList.add('message-sender');
        senderSpan.innerText = sender;

        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message', type);

        // 파일 데이터가 있으면 렌더링
        if (fileData) {
            if (fileType && fileType.startsWith('image/')) {
                const img = document.createElement('img');
                img.src = fileData;
                img.classList.add('chat-img');
                img.onclick = () => {
                    const newWin = window.open();
                    newWin.document.write(`<img src="${fileData}" style="max-width:100%;">`);
                };
                messageDiv.appendChild(img);
            } else {
                const link = document.createElement('a');
                link.href = fileData;
                link.download = fileName || "download";
                link.classList.add('file-link');
                link.innerText = `📁 ${fileName || '첨부파일 다운로드'}`;
                messageDiv.appendChild(link);
            }
        } else {
            messageDiv.appendChild(document.createTextNode(text));
        }

        const timeSpan = document.createElement('span');
        timeSpan.classList.add('message-time');
        timeSpan.innerText = time;

        wrapper.appendChild(senderSpan);
        wrapper.appendChild(messageDiv);
        wrapper.appendChild(timeSpan);
        chatMessages.appendChild(wrapper);
    }

    function changeRoom() {
        const targetRoom = prompt("이동할 방 이름을 입력하세요 (관리자 모드는 admin 입력):", isAdminMode ? "" : currentRoom);
        if (!targetRoom || targetRoom.trim() === "") return;

        const cleanRoom = targetRoom.trim();

        if (cleanRoom === "admin") {
            const pass = prompt("관리자 비밀번호를 입력하세요:");
            if (pass === ADMIN_PASSWORD) {
                enterAdminMode();
            } else {
                alert("비밀번호가 올바르지 않습니다.");
            }
        } else {
            currentRoom = cleanRoom;
            localStorage.setItem('chat_roomname', currentRoom);
            loadMessages();
        }
    }

    function changeName() {
        const newName = prompt("변경할 이름을 입력하세요:", myName);
        if (newName && newName.trim() !== "") {
            myName = newName.trim();
            localStorage.setItem('chat_username', myName);
            document.getElementById('user-display').innerText = myName;
            if(!isAdminMode) loadMessages();
        }
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') handleActionButton();
    }

    function autoScroll() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    initChat();
</script>
</body>
</html>
