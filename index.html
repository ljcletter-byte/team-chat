<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Messenger</title>
    <!-- 외부 모듈 및 외부 스타일 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>
    <div id="app">
        <!-- 1. 로그인 화면 -->
        <div id="login-screen" class="screen active">
            <div class="header">로그인</div>
            <div style="padding: 20px;">
                <input type="text" id="login-id" placeholder="아이디" style="width:100%; padding:10px; margin-bottom:10px;">
                <input type="password" id="login-pw" placeholder="비밀번호" style="width:100%; padding:10px; margin-bottom:10px;">
                <button onclick="handleLogin()" style="width:100%; padding:12px; background:var(--primary-color); color:white; border:none; border-radius:6px; cursor:pointer;">로그인</button>
            </div>
        </div>

<!-- 2. 실시간 채팅방 화면 -->
        <div id="chat-room-screen" class="screen active">
            <div class="header">
                <div style="display:flex; align-items:center; width:100%; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="leaveChatRoom()" style="background:none; border:none; cursor:pointer; font-weight:bold; font-size:16px;">&lt;</button>
                        <span id="chat-room-title" style="font-weight:600;">대화방</span>
                    </div>
                    <!-- 📌 상단 선택 버튼 영역 -->
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button onclick="toggleScheduleModal()" style="background:#EBF8FF; color:#3182CE; border:1px solid #BEE3F8; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;">
                            🗓️ 일정
                        </button>
                        <button onclick="leaveChatRoom()" style="background:#FFF5F5; color:#E53E3E; border:1px solid #FEB2B2; padding:5px 10px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600;">
                            🚪 나가기
                        </button>
                    </div>
                </div>
            </div>

            <!-- 일정 공유 모달 -->
            <div id="schedule-modal" class="hidden">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid var(--primary-color); padding-bottom:8px;">
                    <h3 style="font-size:16px; color:var(--text-main); margin:0;">🗓️ 우리 방 공유 일정</h3>
                    <button onclick="toggleScheduleModal()" style="background:none; border:none; font-size:14px; cursor:pointer; color:var(--text-sub); font-weight:600;">닫기 ✖</button>
                </div>
                <div style="background:#F8FAFC; padding:12px; border-radius:8px; border:1px solid var(--border-color); margin-bottom:15px;">
                    <input type="text" id="sched-title" placeholder="일정 제목을 입력하세요" style="width:100%; padding:8px; border:1px solid var(--border-color); border-radius:4px; margin-bottom:8px; font-size:13px; outline:none;">
                    <div style="display:flex; gap:8px;">
                        <input type="date" id="sched-date" style="flex:1; padding:6px; border:1px solid var(--border-color); border-radius:4px; font-size:13px; outline:none;">
                        <button onclick="addSharedSchedule()" style="background:var(--primary-color); color:white; border:none; padding:0 15px; border-radius:4px; font-size:13px; cursor:pointer; font-weight:600;">등록</button>
                    </div>
                </div>
                <div id="schedule-list" style="flex:1; overflow-y:auto; font-size:14px;"></div>
            </div>

            <!-- 메시지 수신 영역 -->
            <div class="message-area" id="msg-box"></div>

            <!-- 메시지 입력 영역 -->
            <div class="chat-input-area">
                <input type="text" id="chat-input-text" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendTextMessage()">
                <button class="chat-input-btn" onclick="sendTextMessage()">전송</button>
            </div>
        </div>
    </div>

   <!-- Firebase SDK 로드 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <!-- Firebase 초기화 및 연동 -->
    <script>
        // ⚠️ 아래 firebaseConfig 안에 본인의 진짜 Firebase 키 정보가 들어가야 합니다!
        const firebaseConfig = {
            apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g", 
            authDomain: "my-team-chat-2712e.firebaseapp.com",
            databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
            projectId: "my-team-chat-2712e",
            storageBucket: "my-team-chat-2712e.firebasestorage.app",
            messagingSenderId: "929450247074",
            appId: "1:929450247074:web:fda396aa756800456028fb"
        };

        // Firebase 중복 초기화 방지 및 DB 연결
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const database = firebase.database();
    </script>

    <!-- 메인 로직 연결 -->
    <script src="app.js"></script>
</body>
</html>
