<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Web Messenger</title>
    <!-- Pretendard 원격 폰트 및 FontAwesome 아이콘 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase App 및 Realtime Database CDN (v8 사용) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --primary-color: #4A90E2;
            --primary-hover: #357ABD;
            --bg-color: #F4F6F9;
            --card-bg: #FFFFFF;
            --text-main: #333333;
            --text-sub: #888888;
            --border-color: #E1E4E8;
            --my-bubble: #DCF8C6;
            --other-bubble: #FFFFFF;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Pretendard", -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* 모바일 주소창 자동 대응 높이 */
            overflow: hidden;
            position: fixed; /* 모바일 스크롤 튕김 현상 방지 */
            width: 100%;
        }

        #app {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 450px;
            height: 100%;
            max-height: 850px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            overflow: hidden;
        }

        @media (max-width: 480px) {
            #app {
                max-width: 100%;
                height: 100vh;
                height: 100dvh; /* 모바일 화면 꽉 채우기 */
                max-height: 100vh;
                max-height: 100dvh;
                border-radius: 0;
            }
        }

        /* 공통 스크린 구조 */
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .screen.active {
            display: flex;
        }

        /* 헤더 스타일 */
        .header {
            height: 60px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            z-index: 10;
            flex-shrink: 0;
        }

        .header .header-icons i {
            margin-left: 15px;
            cursor: pointer;
            color: var(--text-main);
            font-size: 20px;
        }

        /* 인증 화면 (로그인 / 회원가입) */
        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 30px;
            overflow-y: auto;
        }

        .auth-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            color: var(--primary-color);
            text-align: center;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary-color);
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        .auth-btn:hover {
            background-color: var(--primary-hover);
        }

        .auth-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
        }

        .auth-toggle span {
            color: var(--primary-color);
            font-weight: 600;
        }

        /* 메인 콘텐츠 영역 (탭 화면들) */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-color);
            -webkit-overflow-scrolling: touch;
        }

        /* 하단 네비게이션 바 (모바일 가려짐 방지 개선) */
        .nav-bar {
            height: 65px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            flex-shrink: 0;
            padding-bottom: env(safe-area-inset-bottom); /* 아이폰 하단 제스처바 보호 */
            box-sizing: content-box; 
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            flex: 1;
            padding: 8px 0;
        }

        .nav-item i {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--primary-color);
        }

        /* 리스트 아이템 스타일 (친구, 채팅방) */
        .list-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .list-item:hover {
            background-color: #F8FAFC;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #E2E8F0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #475569;
            margin-right: 15px;
            font-size: 16px;
        }

        .item-info {
            flex: 1;
            overflow: hidden;
        }

        .item-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .item-meta {
            font-size: 12px;
            color: var(--text-sub);
            font-weight: 400;
        }

        .item-last-msg {
            font-size: 13px;
            color: var(--text-sub);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 채팅방 화면 전용 */
        #chat-room-screen {
            background-color: #A9BDCE; 
        }

        #chat-room-screen .header {
            background-color: #A9BDCE;
            border-bottom: none;
        }

        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .msg-container {
            display: flex;
            margin-bottom: 12px;
            max-width: 85%;
        }

        .msg-container.me {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-container.other {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.4;
            word-break: break-all;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-container.me .msg-bubble {
            background-color: var(--my-bubble);
            color: #000;
            border-top-right-radius: 0;
        }

        .msg-container.other .msg-bubble {
            background-color: var(--other-bubble);
            color: #000;
            border-top-left-radius: 0;
        }

        .msg-time {
            font-size: 10px;
            color: #555;
            align-self: flex-end;
            margin: 0 6px;
            white-space: nowrap;
        }

        .msg-sender {
            font-size: 11px;
            color: #444;
            margin-bottom: 3px;
            display: block;
        }

        .msg-content img {
            max-width: 200px;
            border-radius: 8px;
            margin-top: 4px;
            display: block;
        }

        /* 채팅 입력창 (모바일 여백 확보) */
        .chat-input-area {
            padding: 10px 15px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            background-color: var(--card-bg);
            display: flex;
            align-items: center;
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .chat-input-area input[type="text"] {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            outline: none;
            font-size: 14px;
            background-color: #F1F3F5;
        }

        .chat-input-area input[type="text"]:focus {
            background-color: #FFF;
            border-color: var(--primary-color);
        }

        .chat-input-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 10px;
            cursor: pointer;
            border: none;
        }

        .chat-file-label {
            font-size: 20px;
            color: var(--text-sub);
            margin-right: 12px;
            cursor: pointer;
        }

        /* 설정 및 관리자 모드 스타일 */
        .settings-section {
            background-color: var(--card-bg);
            margin-top: 15px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .settings-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            font-size: 15px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .admin-panel {
            padding: 20px;
            background-color: #F8FAFC;
        }

        .admin-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .admin-card h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #1E293B;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 4px;
            display: inline-block;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="app">
    <!-- 1. 로그인 스크린 -->
    <div id="login-screen" class="screen active">
        <div class="auth-container">
            <h1 class="auth-title">Web Messenger</h1>
            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="login-id" placeholder="아이디를 입력하세요">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요">
            </div>
            <button class="auth-btn" onclick="handleLogin()">로그인</button>
            <div class="auth-toggle" onclick="switchScreen('register-screen')">아직 계정이 없으신가요? <span>회원가입</span></div>
        </div>
    </div>

    <!-- 2. 회원가입 스크린 -->
    <div id="register-screen" class="screen">
        <div class="auth-container">
            <h1 class="auth-title">회원가입</h1>
            <div class="input-group">
                <label>아이디</label>
                <input type="text" id="reg-id" placeholder="사용할 아이디 입력">
            </div>
            <div class="input-group">
                <label>이름 / 닉네임</label>
                <input type="text" id="reg-name" placeholder="표시될 이름 입력">
            </div>
            <div class="input-group">
                <label>비밀번호</label>
                <input type="password" id="reg-pw" placeholder="비밀번호 입력">
            </div>
            <button class="auth-btn" onclick="handleRegister()">가입하기</button>
            <div class="auth-toggle" onclick="switchScreen('login-screen')">이미 계정이 있으신가요? <span>로그인</span></div>
        </div>
    </div>

    <!-- 3. 메인 서비스 스크린 -->
    <div id="main-screen" class="screen">
        <div class="header">
            <span id="main-title">친구</span>
            <div class="header-icons" id="main-header-icons"></div>
        </div>

        <div class="main-content" id="tab-content"></div>

        <!-- 하단 탭 바 (수정됨) -->
        <div class="nav-bar">
            <div class="nav-item active" onclick="switchTab('friends')" id="nav-friends">
                <i class="fa-solid fa-user"></i>친구
            </div>
            <div class="nav-item" onclick="switchTab('chats')" id="nav-chats">
                <i class="fa-solid fa-comment"></i>채팅
            </div>
            <div class="nav-item" onclick="switchTab('settings')" id="nav-settings">
                <i class="fa-solid fa-gear"></i>설정
            </div>
        </div>
    </div>

    <!-- 4. 실시간 채팅방 스크린 -->
<div id="chat-room-screen" class="screen">
        <div class="header">
            <div style="display:flex; align-items:center; width:100%; justify-content:space-between;">
                <div style="display:flex; align-items:center;">
                    <i class="fa-solid fa-chevron-left" onclick="leaveChatRoom()" style="cursor:pointer; margin-right:15px; font-size:20px;"></i>
                    <span id="chat-room-title">대화방</span>
                </div>
                <!-- 🌟 우측에 방 나가기 아이콘 배치 -->
                <i class="fa-solid fa-right-from-bracket" onclick="deleteCurrentChatRoom()" style="cursor:pointer; color:#E53E3E; font-size:18px;" title="방 나가기"></i>
            </div>
        </div>
        
        <div class="message-area" id="msg-box"></div>

        <div class="chat-input-area">
            <label for="chat-file" class="chat-file-label" id="file-label">
                <i class="fa-solid fa-paperclip"></i>
            </label>
            <input type="file" id="chat-file" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
            <input type="text" id="chat-input-text" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendTextMessage()">
            <button class="chat-input-btn" onclick="sendTextMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    // ==========================================
    // [중요] 본인의 Firebase 연동 설정 정보를 입력하세요.
    // ==========================================
    const firebaseConfig = {
        apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g",
        databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
        projectId: "my-team-chat-2712e"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    let currentUser = null;       
    let currentTab = 'friends';   
    let currentRoomId = null;     
    let chatActiveListener = null;

    async function sha256(message) {
        const msgBuffer = new TextEncoder().encode(message);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    async function handleRegister() {
        const id = document.getElementById('reg-id').value.trim();
        const name = document.getElementById('reg-name').value.trim();
        const pw = document.getElementById('reg-pw').value.trim();

        if(!id || !name || !pw) return alert('모든 필드를 입력해 주세요.');
        if(id === 'admin-ljc') return alert('해당 ID는 시스템 예약어이므로 회원가입이 불가합니다.');

        const snapshot = await database.ref('users/' + id).once('value');
        if(snapshot.exists()) return alert('이미 가입된 아이디입니다.');

        const hashedPassword = await sha256(pw);
        await database.ref('users/' + id).set({
            id: id,
            name: name,
            password: hashedPassword,
            createdAt: Date.now()
        });

        alert('회원가입이 완료되었습니다. 로그인해 주세요.');
        switchScreen('login-screen');
    }

    async function handleLogin() {
        const id = document.getElementById('login-id').value.trim();
        const pw = document.getElementById('login-pw').value.trim();

        if(!id || !pw) return alert('아이디와 비밀번호를 입력하세요.');

        const hashedPassword = await sha256(pw);

        if(id === 'admin-ljc') {
            const adminSnap = await database.ref('admin_meta').once('value');
            let systemHash = "";
            if(!adminSnap.exists()) {
                systemHash = await sha256("admin1234");
                await database.ref('admin_meta').set({ master: systemHash });
            } else {
                systemHash = adminSnap.val().master;
            }

            if(hashedPassword === systemHash) {
                currentUser = { id: 'admin-ljc', name: '👑 최고관리자' };
                await database.ref('users/admin-ljc').update({ id: 'admin-ljc', name: '👑 최고관리자' });
                alert('최고 관리자 계정으로 로그인하였습니다.');
                enterMainSystem();
            } else {
                alert('관리자 비밀번호가 일치하지 않습니다.');
            }
            return;
        }

        const snap = await database.ref('users/' + id).once('value');
        if(!snap.exists() || snap.val().password !== hashedPassword) {
            return alert('아이디 또는 비밀번호를 잘못 입력하셨습니다.');
        }

        currentUser = { id: snap.val().id, name: snap.val().name };
        enterMainSystem();
    }

    function enterMainSystem() {
        switchScreen('main-screen');
        switchTab('friends');
    }

    function switchTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.getElementById('nav-' + tabName).classList.add('active');

        const titleEl = document.getElementById('main-title');
        const iconContainer = document.getElementById('main-header-icons');
        iconContainer.innerHTML = ''; 

        if(tabName === 'friends') {
            titleEl.textContent = '친구';
            if(currentUser.id !== 'admin-ljc') {
                iconContainer.innerHTML = `<i class="fa-solid fa-user-plus" onclick="promptAddFriend()"></i>`;
            }
            loadFriendsTab();
        } else if(tabName === 'chats') {
            titleEl.textContent = '채팅';
            loadChatsTab();
        } else if(tabName === 'settings') {
            titleEl.textContent = '설정';
            loadSettingsTab();
        }
    }

    function loadFriendsTab() {
        const container = document.getElementById('tab-content');
        container.innerHTML = '<div style="padding:20px; text-align:center; color:var(--text-sub);">로드 중...</div>';

        if (currentUser.id === 'admin-ljc') {
            database.ref('users').on('value', (snapshot) => {
                if (currentTab !== 'friends') return;
                container.innerHTML = '';
                
                let count = 0;
                snapshot.forEach((child) => {
                    const user = child.val();
                    if (user.id === currentUser.id) return;

                    count++;
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.onclick = () => startChatWith(user.id, user.name);
                    item.innerHTML = `
                        <div class="avatar">${user.name.charAt(0)}</div>
                        <div class="item-info">
                            <div class="item-name">${user.name} <span style="font-size:11px; color:var(--primary-color); font-weight:normal;">(자동 동기화)</span></div>
                            <div class="item-meta">ID: ${user.id}</div>
                        </div>
                    `;
                    container.appendChild(item);
                });

                if (count === 0) {
                    container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-sub);">가입된 일반 회원이 없습니다.</div>';
                }
            });
            return;
        }

        database.ref('friends/' + currentUser.id).on('value', async (snapshot) => {
            if(currentTab !== 'friends') return;
            container.innerHTML = '';

            let hasFriends = false;
            const targetIds = [];

            snapshot.forEach(child => {
                if(child.val().status === 'accepted') {
                    targetIds.push(child.key);
                    hasFriends = true;
                }
            });

            if(!hasFriends) {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-sub);">등록된 친구가 없습니다. 우측 상단 버튼을 눌러 친구를 추가해 보세요!</div>';
                return;
            }

            for(let fid of targetIds) {
                const uSnap = await database.ref('users/' + fid).once('value');
                if(uSnap.exists()) {
                    const friendData = uSnap.val();
                    const item = document.createElement('div');
                    item.className = 'list-item';
                    item.onclick = () => startChatWith(friendData.id, friendData.name);
                    item.innerHTML = `
                        <div class="avatar">${friendData.name.charAt(0)}</div>
                        <div class="item-info">
                            <div class="item-name">${friendData.name}</div>
                            <div class="item-meta">@${friendData.id}</div>
                        </div>
                    `;
                    container.appendChild(item);
                }
            }
        });
    }

    async function promptAddFriend() {
        const targetId = prompt('추가할 친구의 아이디를 정확히 입력해 주세요:');
        if(!targetId) return;
        if(targetId === currentUser.id) return alert('본인 자신은 추가할 수 없습니다.');

        const targetSnap = await database.ref('users/' + targetId).once('value');
        if(!targetSnap.exists()) return alert('존재하지 않는 사용자 아이디입니다.');

        await database.ref(`friends/${currentUser.id}/${targetId}`).set({ status: 'accepted' });
        await database.ref(`friends/${targetId}/${currentUser.id}`).set({ status: 'accepted' });
        alert(`${targetSnap.val().name}님과 친구가 완료되었습니다!`);
    }

    function loadChatsTab() {
        const container = document.getElementById('tab-content');
        container.innerHTML = '';

        database.ref('user_rooms/' + currentUser.id).on('value', async (snapshot) => {
            if(currentTab !== 'chats') return;
            container.innerHTML = '';

            if(!snapshot.exists()) {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:var(--text-sub);">참여 중인 대화방이 없습니다.</div>';
                return;
            }

            snapshot.forEach(child => {
                const roomInfo = child.val();
                const roomId = child.key;

                const item = document.createElement('div');
                item.className = 'list-item';
                item.onclick = () => enterChatRoom(roomId, roomInfo.roomTitle);
                item.innerHTML = `
                    <div class="avatar"><i class="fa-solid fa-comments"></i></div>
                    <div class="item-info">
                        <div class="item-name">
                            <span>${roomInfo.roomTitle}</span>
                            <span class="item-meta">${roomInfo.lastTimestamp ? new Date(roomInfo.lastTimestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : ''}</span>
                        </div>
                        <div class="item-last-msg">${roomInfo.lastMessage || '대화 내역이 없습니다.'}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        });
    }

    async function startChatWith(targetId, targetName) {
        const sortedIds = [currentUser.id, targetId].sort();
        const combinedRoomId = 'room_' + sortedIds[0] + '_' + sortedIds[1];

        await database.ref(`user_rooms/${currentUser.id}/${combinedRoomId}`).update({ roomTitle: targetName });
        await database.ref(`user_rooms/${targetId}/${combinedRoomId}`).update({ roomTitle: currentUser.name });

        enterChatRoom(combinedRoomId, targetName);
    }

    function enterChatRoom(roomId, roomTitle) {
        currentRoomId = roomId;
        document.getElementById('chat-room-title').textContent = roomTitle;
        switchScreen('chat-room-screen');

        const msgBox = document.getElementById('msg-box');
        msgBox.innerHTML = '';

        if(chatActiveListener) database.ref('rooms/' + currentRoomId).off('value', chatActiveListener);

        chatActiveListener = database.ref('rooms/' + currentRoomId).on('value', (snapshot) => {
            msgBox.innerHTML = '';
            if(!snapshot.exists()) return;

            snapshot.forEach(child => {
                const msg = child.val();
                const isMe = msg.senderId === currentUser.id;

                const container = document.createElement('div');
                container.className = `msg-container ${isMe ? 'me' : 'other'}`;

                let innerHTML = '';
                if(!isMe) {
                    innerHTML += `<div class="avatar" style="width:32px; height:32px; font-size:12px; margin-right:8px;">${msg.senderName.charAt(0)}</div>`;
                }

                innerHTML += `
                    <div class="msg-content">
                        ${!isMe ? `<span class="msg-sender">${msg.senderName}</span>` : ''}
                        <div class="msg-bubble">
                            ${msg.type === 'image' ? `<img src="${msg.body}" alt="사진">` : msg.body}
                        </div>
                    </div>
                    <span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                `;

                container.innerHTML = innerHTML;
                msgBox.appendChild(container);
            });
            msgBox.scrollTop = msgBox.scrollHeight;
        });
    }

    function leaveChatRoom() {
        if(chatActiveListener) {
            database.ref('rooms/' + currentRoomId).off('value', chatActiveListener);
            chatActiveListener = null;
        }
        currentRoomId = null;
        switchScreen('main-screen');
        switchTab('chats');
    }

    async function sendTextMessage() {
        const input = document.getElementById('chat-input-text');
        const text = input.value.trim();
        if(!text) return;

        const msgData = {
            senderId: currentUser.id,
            senderName: currentUser.name,
            type: 'text',
            body: text,
            timestamp: Date.now()
        };

        await database.ref('rooms/' + currentRoomId).push(msgData);
        
        database.ref('user_rooms').once('value', snapshot => {
            snapshot.forEach(userSnap => {
                if(userSnap.hasChild(currentRoomId)) {
                    database.ref(`user_rooms/${userSnap.key}/${currentRoomId}`).update({
                        lastMessage: text,
                        lastTimestamp: Date.now()
                    });
                }
            });
        });

        input.value = '';
    }

    function handleImageUpload(input) {
        if(!input.files || !input.files[0]) return;
        const file = input.files[0];
        const label = document.getElementById('file-label');
        
        label.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;

        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = async function() {
                const canvas = document.createElement('canvas');
                const max_size = 500;
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > max_size) { height *= max_size / width; width = max_size; }
                } else {
                    if (height > max_size) { width *= max_size / height; height = max_size; }
                }

                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.5);

                const msgData = {
                    senderId: currentUser.id,
                    senderName: currentUser.name,
                    type: 'image',
                    body: dataUrl,
                    timestamp: Date.now()
                };

                await database.ref('rooms/' + currentRoomId).push(msgData);
                
                database.ref('user_rooms').once('value', snapshot => {
                    snapshot.forEach(userSnap => {
                        if(userSnap.hasChild(currentRoomId)) {
                            database.ref(`user_rooms/${userSnap.key}/${currentRoomId}`).update({
                                lastMessage: '📷 [사진이 전송되었습니다]',
                                lastTimestamp: Date.now()
                            });
                        }
                    });
                });

                label.innerHTML = `<i class="fa-solid fa-paperclip"></i>`;
                input.value = '';
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function loadSettingsTab() {
        const container = document.getElementById('tab-content');
        container.innerHTML = `
            <div class="settings-section">
                <div class="settings-item">
                    <div><strong>${currentUser.name}</strong> (${currentUser.id})</div>
                    <span style="font-size:12px; color:var(--text-sub);">접속 중</span>
                </div>
                <div class="settings-item" onclick="location.reload();" style="color:#E53E3E;">
                    <div>로그아웃</div>
                    <i class="fa-solid fa-right-from-bracket"></i>
                </div>
            </div>

            <div class="settings-section">
                <div class="settings-item" onclick="verifyAdminInfrastructure()">
                    <div style="color:var(--primary-color); font-weight:600;"><i class="fa-solid fa-shield-halved" style="margin-right:8px;"></i>시스템 관리자 모드</div>
                    <i class="fa-solid fa-chevron-right"></i>
                </div>
            </div>
            <div id="admin-injection-point"></div>
        `;
    }

    async function verifyAdminInfrastructure() {
        if(document.getElementById('admin-panel-ui')) {
            document.getElementById('admin-panel-ui').remove();
            return;
        }

        const inputPw = prompt('마스터 제어 암호를 입력해 주세요:');
        if(!inputPw) return;

        const hashed = await sha256(inputPw);
        const meta = await database.ref('admin_meta').once('value');
        
        if(meta.exists() && meta.val().master === hashed) {
            loadAdminInfrastructure();
        } else {
            alert('인증 비밀번호가 일치하지 않습니다. 접근이 거부되었습니다.');
        }
    }

    function loadAdminInfrastructure() {
        const injectPoint = document.getElementById('admin-injection-point');
        
        let userCard = document.getElementById('admin-panel-ui');
        if(!userCard) {
            userCard = document.createElement('div');
            userCard.id = 'admin-panel-ui';
            userCard.className = 'admin-panel';
            injectPoint.appendChild(userCard);
        }

        userCard.innerHTML = `
            <div class="admin-card">
                <h4>🔑 마스터 제어 암호 변경</h4>
                <div class="input-group" style="margin-top:8px;">
                    <input type="password" id="new-master-pw" placeholder="새로운 마스터 암호 입력" style="padding:8px;">
                    <button class="auth-btn" style="padding:8px; font-size:13px; margin-top:5px;" onclick="updateAdminPassword()">변경 확정</button>
                </div>
            </div>
            <div class="admin-card">
                <h4>👥 가입된 전체 회원 관리</h4>
                <div id="admin-user-list" style="font-size:13px; max-height:200px; overflow-y:auto; margin-top:8px;">
                    로드 중...
                </div>
            </div>
        `;

        database.ref('users').once('value', (snapshot) => {
            const listEl = document.getElementById('admin-user-list');
            listEl.innerHTML = '';
            
            snapshot.forEach(child => {
                const u = child.val();
                const uDiv = document.createElement('div');
                uDiv.style = "display:flex; justify-content:between; align-items:center; border-bottom:1px solid #EEE; padding:6px 0;";
                uDiv.innerHTML = `
                    <div style="flex:1;"><strong>${u.name}</strong> (${u.id})</div>
                    <button style="color:red; background:none; border:none; cursor:pointer;" onclick="purgeUser('${u.id}')">강퇴</button>
                `;
                listEl.appendChild(uDiv);
            });
        });
    }

    async function updateAdminPassword() {
        const newPw = document.getElementById('new-master-pw').value.trim();
        if(!newPw) return alert('변경할 암호를 입력하세요.');

        const newHash = await sha256(newPw);
        await database.ref('admin_meta').update({ master: newHash });
        alert('최고 관리자 마스터 암호가 성공적으로 변경되었습니다.');
        if(document.getElementById('admin-panel-ui')) document.getElementById('admin-panel-ui').remove();
    }

    async function purgeUser(userId) {
        if(userId === 'admin-ljc') return alert('최고 관리자 계정은 삭제할 수 없습니다.');
        if(!confirm(`[경고] 정말로 ${userId} 유저를 강제 퇴장 및 삭제 처리하시겠습니까?`)) return;

        await database.ref('users/' + userId).remove();
        await database.ref('friends/' + userId).remove();
        await database.ref('user_rooms/' + userId).remove();

        alert('해당 유저의 모든 계정 데이터가 파기되었습니다.');
        loadAdminInfrastructure();
    }
// 현재 진입한 대화방을 내 목록에서만 지우는 함수
    async function deleteCurrentChatRoom() {
        if (!currentRoomId || !currentUser) return;

        if (!confirm("이 대화방을 완전히 나가시겠습니까?\n내 화면에서 대화 목록이 완전히 삭제되며 복구할 수 없습니다.")) {
            return;
        }

        try {
            // Firebase에서 내 계정 하위의 해당 방 목록만 삭제 (상대방 대화 기록은 유지됨)
            await database.ref(`user_rooms/${currentUser.id}/${currentRoomId}`).remove();
            
            alert("대화방을 나갔습니다.");
            
            // 기존에 있던 뒤로가기 함수를 호출하여 안전하게 메인 채팅 목록으로 이동
            leaveChatRoom(); 
            
        } catch (error) {
            console.error("방 나가기 오류:", error);
            alert("방을 나가는 도중 오류가 발생했습니다.");
        }
    }    
</script>
