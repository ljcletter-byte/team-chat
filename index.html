<!-- index.html의 전체 코드를 아래 내용으로 갱신하세요 -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen 팀 메신저</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --primary: #4f46e5; --bg-main: #f8fafc; --text-main: #0f172a; --border-color: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard", sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #e2e8f0; }
        .chat-container { width: 440px; height: 680px; background: white; border-radius: 20px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        /* 헤더/메시지 스타일 (이전과 동일) */
        .chat-header { background: var(--text-main); color: white; padding: 20px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: var(--bg-main); display: flex; flex-direction: column; gap: 14px; }
        .message-wrapper { display: flex; flex-direction: column; max-width: 80%; }
        .message-wrapper.sent { align-self: flex-end; align-items: flex-end; }
        .message-wrapper.received { align-self: flex-start; align-items: flex-start; }
        .message { padding: 12px 16px; border-radius: 16px; font-size: 0.9rem; border: 1px solid var(--border-color); }
        .message.sent { background: var(--primary); color: white; border-bottom-right-radius: 4px; }
        .message.received { background: white; border-bottom-left-radius: 4px; }
        
        /* 이미지 UI 개선 */
        .img-msg-container { display: flex; flex-direction: column; gap: 8px; }
        .chat-img { max-width: 200px; border-radius: 10px; cursor: pointer; transition: transform 0.2s; }
        .chat-img:hover { transform: scale(1.02); }
        .download-btn { display: inline-block; background: #e2e8f0; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; text-decoration: none; color: #475569; font-weight: 600; text-align: center; }
        .download-btn:hover { background: #cbd5e1; }

        /* 이미지 뷰어 모달 */
        #img-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 100; justify-content: center; align-items: center; }
        #img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        
        /* 입력창 및 기타 디자인 (이전과 동일) */
        .chat-input-area { padding: 16px; border-top: 1px solid #e2e8f0; display: flex; gap: 10px; align-items: center; background: white; }
        #message-input { flex: 1; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; }
        #send-btn { background: var(--primary); color: white; border: none; padding: 10px 16px; border-radius: 12px; cursor: pointer; }
    </style>
</head>
<body>

<!-- 이미지 크게 보기 모달 -->
<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-img" src="" alt="확대">
</div>

<div class="chat-container">
    <div class="chat-header">
        <h2 id="room-title">💬 채팅방</h2>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-area">
        <input type="file" id="file-input" style="display:none" onchange="handleFile(this)">
        <button onclick="document.getElementById('file-input').click()" style="border:none; background:none; cursor:pointer;">📎</button>
        <input type="text" id="message-input" placeholder="메시지 입력..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script>
    // [Firebase 설정은 기존과 동일]
    const firebaseConfig = {
        apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g",
        databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
        projectId: "my-team-chat-2712e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // [기능 로직]
    const myName = localStorage.getItem('chat_username') || "익명";
    const currentRoom = localStorage.getItem('chat_roomname') || "기본방";
    
    function sendMessage() {
        const input = document.getElementById('message-input');
        if(!input.value.trim()) return;
        db.ref(`messages/${currentRoom}`).push({ sender: myName, text: input.value, time: new Date().toLocaleTimeString() });
        input.value = '';
    }

    function handleFile(input) {
        const file = input.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            db.ref(`messages/${currentRoom}`).push({ 
                sender: myName, fileData: e.target.result, fileName: file.name, time: new Date().toLocaleTimeString() 
            });
        };
        reader.readAsDataURL(file);
    }

    db.ref(`messages/${currentRoom}`).on('child_added', (snap) => {
        const d = snap.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `message-wrapper ${d.sender === myName ? 'sent' : 'received'}`;
        
        let content = `<div class="message ${d.sender === myName ? 'sent' : 'received'}">`;
        if(d.fileData) {
            content += `
                <div class="img-msg-container">
                    <img src="${d.fileData}" class="chat-img" onclick="showModal('${d.fileData}')">
                    <a href="${d.fileData}" download="${d.fileName || 'image.png'}" class="download-btn">💾 다운로드</a>
                </div>`;
        } else {
            content += d.text;
        }
        content += `</div>`;
        msgDiv.innerHTML = content;
        document.getElementById('chat-messages').appendChild(msgDiv);
        document.getElementById('chat-messages').scrollTop = 99999;
    });

    function showModal(src) {
        document.getElementById('modal-img').src = src;
        document.getElementById('img-modal').style.display = 'flex';
    }
</script>
</body>
</html>
