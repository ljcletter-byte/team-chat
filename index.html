<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KakaoT-Style 최고보안 메신저 (초대형 관제 고도화 v7)</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --kakao-nav-bg: #1e1e24;
            --kakao-sidebar-bg: #ffffff;
            --kakao-chat-bg: #b4c3d2;
            --kakao-yellow: #fee500;
            --text-main: #191919;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --online-green: #10b981;
            --unread-red: #f43f5e;
            --admin-purple: #4c1d95;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Pretendard Variable", Pretendard, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #f8fafc; overflow: hidden; }

        /* 가입 승인 관리 및 차단 스크린 락 오버레이 */
        #app-lock-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #ffffff; z-index: 9999; display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 24px;
        }
        #app-lock-overlay i { font-size: 4.5rem; color: #475569; margin-bottom: 24px; }
        #app-lock-overlay h2 { font-size: 1.6rem; font-weight: 800; color: var(--text-main); margin-bottom: 12px; }
        #app-lock-overlay p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; max-width: 400px; }

        .app-container {
            width: 1050px;
            height: 720px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
            display: flex;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* 1단 내비게이션 바 */
        .nav-bar {
            width: 75px;
            background-color: var(--kakao-nav-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 28px 0;
            gap: 32px;
            flex-shrink: 0;
        }
        .nav-item { color: #64748b; font-size: 1.5rem; cursor: pointer; transition: color 0.2s; position: relative; }
        .nav-item:hover, .nav-item.active { color: #ffffff; }
        .nav-badge {
            position: absolute; top: -6px; right: -8px;
            background: var(--unread-red); color: #fff;
            font-size: 0.62rem; font-weight: 700;
            min-width: 16px; height: 16px; padding: 0 4px;
            border-radius: 8px; display: none;
            align-items: center; justify-content: center;
        }

        /* 2단 리스트 사이드바 */
        .sub-sidebar {
            width: 290px;
            background-color: var(--kakao-sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }
        .sidebar-title-area { padding: 24px 20px 12px 20px; }
        .sidebar-title-area h3 { font-size: 1.25rem; font-weight: 800; color: var(--text-main); }

        .my-profile-card { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border-color); }
        .avatar-wrap { position: relative; flex-shrink: 0; }
        .profile-avatar { width: 44px; height: 44px; background: #f1f5f9; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: #334155; font-weight: bold; border: 1px solid #e2e8f0; }
        .status-dot {
            position: absolute; bottom: -1px; right: -1px;
            width: 13px; height: 13px; border-radius: 50%;
            background: #cbd5e1; border: 2.5px solid #fff;
        }
        .status-dot.online { background: var(--online-green); }
        .my-profile-info { flex: 1; min-width: 0; }
        .my-profile-info h4 { font-size: 0.92rem; font-weight: 700; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .my-profile-info p { font-size: 0.78rem; color: var(--text-muted); cursor: pointer; margin-top: 2px; display: inline-block; }
        .my-profile-info p:hover { text-decoration: underline; color: #000; }

        .list-scroll-area { flex: 1; overflow-y: auto; padding: 10px 0; }

        /* 리스트 컴포넌트 아이템 */
        .list-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: background 0.15s; position: relative; }
        .list-item:hover { background-color: #f8fafc; }
        .list-item.active { background-color: #f1f5f9; }
        .item-body { flex: 1; min-width: 0; }
        .item-header-line { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
        .item-name { font-size: 0.92rem; font-weight: 600; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-time { font-size: 0.72rem; color: var(--text-muted); flex-shrink: 0; }
        .item-bottom-line { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
        .item-preview { font-size: 0.82rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; min-width: 0; }
        
        .unread-badge {
            background: var(--unread-red); color: #fff; font-size: 0.65rem; font-weight: 700;
            min-width: 18px; height: 18px; padding: 0 5px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .empty-placeholder { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; }

        /* 3단 메인 대화 본문 */
        .main-content { flex: 1; display: flex; flex-direction: column; background-color: var(--kakao-chat-bg); position: relative; min-width: 0; }
        .view-panel { display: flex; flex-direction: column; width: 100%; height: 100%; }

        .chat-header { background-color: rgba(255,255,255,0.92); backdrop-filter: blur(8px); padding: 16px 24px; border-bottom: 1px solid rgba(0,0,0,0.06); display: flex; align-items: center; gap: 12px; }
        .chat-header-info { flex: 1; min-width: 0; }
        .chat-header h2 { font-size: 1.05rem; font-weight: 700; color: var(--text-main); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-header-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }

        .back-btn { display: none; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-main); padding-right: 4px; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        /* 날짜 구분선 */
        .date-divider { align-self: center; background: rgba(0,0,0,0.15); color: #fff; font-size: 0.72rem; padding: 4px 14px; border-radius: 12px; margin: 8px 0; }

        .msg-row { display: flex; gap: 8px; max-width: 85%; position: relative; }
        .msg-row.sent { align-self: flex-end; flex-direction: row-reverse; }
        .msg-row.received { align-self: flex-start; }
        .msg-row.sent .profile-avatar { display: none; }

        .msg-container { display: flex; flex-direction: column; min-width: 0; }
        .msg-row.sent .msg-container { align-items: flex-end; }
        .msg-username { font-size: 0.78rem; color: #475569; margin-bottom: 4px; font-weight: 600; }
        .msg-bubble-wrap { display: flex; align-items: flex-end; gap: 6px; }
        .msg-row.sent .msg-bubble-wrap { flex-direction: row-reverse; }

        .bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.45; word-break: break-word; box-shadow: 0 1px 2px rgba(0,0,0,0.05); white-space: pre-wrap; }
        .msg-row.sent .bubble { background-color: var(--kakao-yellow); color: #000; border-top-right-radius: 0; }
        .msg-row.received .bubble { background-color: #ffffff; color: var(--text-main); border-top-left-radius: 0; }
        .bubble.deleted { background-color: #f1f5f9 !important; color: #94a3b8; font-style: italic; border: 1px dashed #cbd5e1; box-shadow: none; }

        .edited-tag { font-size: 0.65rem; color: #94a3b8; margin-left: 4px; }
        .msg-meta-col { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
        .msg-row.received .msg-meta-col { align-items: flex-start; }
        .msg-read-mark { font-size: 0.65rem; color: #d97706; font-weight: 700; }
        .msg-time-stamp { font-size: 0.68rem; color: #475569; flex-shrink: 0; }

        .msg-actions { display: none; gap: 6px; align-items: center; align-self: center; }
        .msg-row.sent:hover .msg-actions { display: flex; }
        .msg-action-btn { background: rgba(255,255,255,0.8); border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; color: #475569; font-size: 0.72rem; display: flex; align-items: center; justify-content: center; }
        .msg-action-btn:hover { background: #fff; color: #000; }

        .img-card { display: flex; flex-direction: column; gap: 4px; }
        .chat-img { max-width: 180px; max-height: 220px; border-radius: 8px; cursor: pointer; object-fit: cover; }
        .download-link { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; text-decoration: none; color: #334155; background: rgba(0,0,0,0.05); padding: 4px 8px; border-radius: 4px; }

        /* 타이핑 인디케이터 */
        .typing-row { align-self: flex-start; display: none; flex-direction: column; gap: 4px; }
        .typing-bubble { background: #fff; padding: 12px 16px; border-radius: 12px; border-top-left-radius: 0; display: flex; gap: 4px; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .typing-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; animation: typingBounce 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
        .typing-label { font-size: 0.72rem; color: var(--text-muted); padding-left: 4px; }

        .chat-input-area { padding: 16px 20px; background-color: #fff; display: flex; gap: 12px; align-items: center; flex-direction: column; }
        .edit-banner { display: none; width: 100%; background: #fffbeb; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; font-size: 0.8rem; color: #b45309; justify-content: space-between; align-items: center; }
        .edit-banner button { background: none; border: none; cursor: pointer; color: #b45309; }
        .input-row { display: flex; gap: 12px; align-items: center; width: 100%; }

        .file-label { color: #475569; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.25rem; flex-shrink: 0; }
        #file-input { display: none; }
        #message-input { flex: 1; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; outline: none; font-size: 0.92rem; background-color: #f8fafc; }
        #message-input:focus { border-color: #cbd5e1; background-color: #fff; }
        #send-btn { background-color: var(--kakao-yellow); color: #3c1e1e; border: 1px solid #e2cb00; width: 55px; height: 40px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.88rem; }

        .no-room-placeholder { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #64748b; gap: 12px; text-align: center; }
        .no-room-placeholder i { font-size: 3.5rem; opacity: 0.3; }

        /* 시스템 관리자 최고 보안 관제 타워 레이아웃 */
        .admin-header { background-color: var(--admin-purple); color: white; padding: 18px 24px; display: flex; justify-content: space-between; align-items: center; }
        .admin-body { flex: 1; padding: 24px; overflow-y: auto; display: flex; flex-direction: column; gap: 24px; background-color: #f8fafc; }
        .admin-card { background: white; padding: 20px; border-radius: 14px; border: 1px solid var(--border-color); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .admin-card h4 { margin-bottom: 14px; font-size: 0.98rem; color: var(--admin-purple); display: flex; align-items: center; gap: 8px; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .admin-input-group { display: flex; gap: 8px; margin-bottom: 12px; }
        .admin-input { flex: 1; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 0.88rem; }
        .admin-btn { background: var(--admin-purple); color: white; border: none; padding: 10px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: bold; }
        .admin-list-pool { display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 11px 14px; background: #f8fafc; border-radius: 8px; border: 1px solid var(--border-color); font-size: 0.85rem; }
        
        /* 개별 보안방 실시간 통제 카드 */
        .admin-room-control-card { background: #f8fafc; border: 1px solid var(--border-color); border-radius: 10px; padding: 14px; margin-bottom: 12px; }
        .admin-member-tag { background: #e2e8f0; color: #1e293b; padding: 3px 8px; border-radius: 6px; font-size: 0.78rem; display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
        
        .action-btn-set { display: flex; gap: 4px; }
        .action-approve { background: #10b981; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.78rem; }
        .action-block { background: #f43f5e; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.78rem; }

        #img-modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center; }
        #img-modal img { max-width: 90%; max-height: 90%; border-radius: 8px; }
        .sound-toggle { position: absolute; bottom: 90px; right: 20px; z-index: 5; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 1px solid var(--border-color); cursor: pointer; display: flex; align-items: center; justify-content: center; color: #475569; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }

        @media (max-width: 768px) {
            body { background: #fff; }
            .app-container { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; }
            .main-content { display: none !important; }
            .nav-bar { width: 65px; padding: 16px 0; }
            .sub-sidebar { flex: 1; width: auto; border-right: none; }
            .app-container.chat-open .nav-bar { display: none !important; }
            .app-container.chat-open .sub-sidebar { display: none !important; }
            .app-container.chat-open .main-content { display: flex !important; width: 100% !important; }
            .back-btn { display: block !important; }
        }
    </style>
</head>
<body>

<!-- 가입 제어 스크린락 모듈 -->
<div id="app-lock-overlay" style="display: none;">
    <i id="lock-icon" class="fa-solid fa-user-lock"></i>
    <h2 id="lock-title">네트워크 무결성 검증 중..</h2>
    <p id="lock-desc">안전한 인프라 채널 조율을 위해 대기 중입니다.</p>
</div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-img" src="" alt="보안확대사진">
</div>

<div class="app-container">
    <!-- 1단 네비게이션 메인 바 -->
    <div class="nav-bar">
        <div class="nav-item active" id="btn-tab-friends" onclick="switchTab('friends')"><i class="fa-solid fa-address-book"></i></div>
        <div class="nav-item" id="btn-tab-chats" onclick="switchTab('chats')">
            <i class="fa-solid fa-comments"></i>
            <span class="nav-badge" id="nav-chat-badge">0</span>
        </div>
        <div class="nav-item" id="btn-tab-admin" onclick="openAdminMode()"><i class="fa-solid fa-tower-observation"></i></div>
    </div>

    <!-- 2단 목록 제어 사이드바 -->
    <div class="sub-sidebar">
        <div class="sidebar-title-area">
            <h3 id="sidebar-main-title">보안 주소록</h3>
        </div>
        <div class="my-profile-card">
            <div class="avatar-wrap">
                <div class="profile-avatar" id="my-avatar-box">익</div>
                <span class="status-dot online"></span>
            </div>
            <div class="my-profile-info">
                <h4 id="my-name-display">인프라 연결 중..</h4>
                <p onclick="changeMyName()">호출명 수정</p>
            </div>
        </div>
        <div class="list-scroll-area" id="dynamic-list-container"></div>
    </div>

    <!-- 3단 대화방 뷰어 영역 -->
    <div class="main-content">
        <div id="panel-chat-view" class="view-panel">
            <div class="chat-header">
                <button class="back-btn" onclick="closeChatMobile()"><i class="fa-solid fa-chevron-left"></i></button>
                <div class="chat-header-info">
                    <h2 id="active-room-title">대화 세션을 선택하세요</h2>
                    <div class="chat-header-sub" id="active-room-sub"></div>
                </div>
            </div>

            <div class="chat-messages" id="chat-messages-box">
                <div class="no-room-placeholder" id="no-room-placeholder">
                    <i class="fa-solid fa-user-secret"></i>
                    <span>초대 승인된 인원만 진입할 수 있는<br>종단간 암호화 대화 공간입니다.</span>
                </div>
            </div>

            <button class="sound-toggle" id="sound-toggle" onclick="toggleSound()">
                <i class="fa-solid fa-volume-high"></i>
            </button>

            <div class="chat-input-area">
                <div class="edit-banner" id="edit-banner">
                    <span><i class="fa-solid fa-pen-to-square"></i> 보안 메시지 수정 중...</span>
                    <button onclick="cancelEdit()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="input-row">
                    <label for="file-input" class="file-label"><i class="fa-regular fa-square-plus"></i></label>
                    <input type="file" id="file-input" accept="image/*" onchange="uploadPhoto(this)">
                    <input type="text" id="message-input" placeholder="통제망 메시지 입력..." oninput="handleTyping()" onkeypress="if(event.key==='Enter') sendKakaoMsg()">
                    <button id="send-btn" onclick="sendKakaoMsg()">전송</button>
                </div>
            </div>
        </div>

        <!-- 4단 백오피스 최고 관제 통제 타워 -->
        <div id="panel-admin-view" class="view-panel" style="display: none;">
            <div class="admin-header">
                <h2><i class="fa-solid fa-shield-halved"></i> 통제망 인프라 마스터 컨트롤러</h2>
                <button class="admin-btn" style="background:#6b21a8;" onclick="closeAdminMode()">관제 모드 종료</button>
            </div>
            <div class="admin-body">
                <div class="admin-card">
                    <h4><i class="fa-solid fa-folder-plus"></i> 최상위 통제 보안 세션 개설</h4>
                    <div class="admin-input-group">
                        <input type="text" id="new-room-title" class="admin-input" placeholder="개설할 폐쇄 방 제목 입력..">
                        <button class="admin-btn" onclick="systemCreateRoom()">방 개설</button>
                    </div>
                </div>
                <div class="admin-card">
                    <h4><i class="fa-solid fa-user-clock"></i> 신규 기기 네트워크 승인 대기열 (Q1-B)</h4>
                    <div class="admin-list-pool" id="admin-user-requests"></div>
                </div>
                <div class="admin-card">
                    <h4><i class="fa-solid fa-users-viewfinder"></i> 개별 대화방 및 소속 멤버 실시간 제어·초대</h4>
                    <div class="admin-list-pool" id="admin-room-management"></div>
                </div>
                <div class="admin-card">
                    <h4><i class="fa-solid fa-users-gear"></i> 기기 마스터 상태 관제 (네트워크 차단 제어)</h4>
                    <div class="admin-list-pool" id="admin-approved-users"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDfACFo9nn2MaJusjlII9y6Wj6QIGuf65g",
        databaseURL: "https://my-team-chat-2712e-default-rtdb.firebaseio.com",
        projectId: "my-team-chat-2712e"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const ADMIN_PASS = "1234";

    /* ===================== 기기 식별 및 암호키 바인딩 ===================== */
    let myId = localStorage.getItem('chat_userid_v7') || "u_" + Date.now() + "_" + Math.floor(Math.random() * 1000);
    localStorage.setItem('chat_userid_v7', myId);

    let myName = localStorage.getItem('chat_username_v7') || "보안원_" + Math.floor(Math.random() * 9000 + 1000);
    localStorage.setItem('chat_username_v7', myName);

    let currentRoomId = null;
    let currentRoomTitle = "";
    let activeTab = "friends";
    let soundEnabled = localStorage.getItem('chat_sound_v7') !== 'off';

    /* 실시간 전역 구조체 캐시 */
    let globalRoomsData = {};
    let unreadCache = {};
    let typingTimeout = null;
    let editingMsgKey = null;
    let lastRenderedDate = null;

    /* 실시간 이벤트 메모리 프리저버 */
    let currentMsgAddedRef = null, currentMsgChangedRef = null;
    let currentTypingRef = null;
    let currentMembershipRef = null;

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    /* WebAudio 비프음 인프라 */
    let audioCtx = null;
    function playNotifySound() {
        if (!soundEnabled) return;
        try {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const now = audioCtx.currentTime;
            [660, 880].forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.0001, now + i * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.2, now + i * 0.1 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.1 + 0.15);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.18);
            });
        } catch (e){}
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem('chat_sound_v7', soundEnabled ? 'on' : 'off');
        document.getElementById('sound-toggle').innerHTML = soundEnabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>';
    }

    /* ===================== 하트비트 애플리케이션 바인딩 코어 ===================== */
    function initApplication() {
        document.getElementById('my-name-display').innerText = myName;
        document.getElementById('my-avatar-box').innerText = myName.substring(0, 1);

        const lockOverlay = document.getElementById('app-lock-overlay');
        lockOverlay.style.display = 'flex';

        const userRef = database.ref(`kakao_style/users/${myId}`);
        userRef.once('value', (snap) => {
            if (!snap.exists()) {
                userRef.set({ id: myId, name: myName, status: "pending", lastSeen: Date.now() });
            }
        });

        userRef.child('status').on('value', (statusSnap) => {
            const currentStatus = statusSnap.val() || "pending";
            
            if (currentStatus === 'approved') {
                lockOverlay.style.display = 'none';
                bindPresenceSystem();
                subscribeRoomsMeta();
                switchTab('friends');
            } else if (currentStatus === 'blocked') {
                lockOverlay.style.display = 'flex';
                document.getElementById('lock-icon').className = "fa-solid fa-user-slash";
                document.getElementById('lock-icon').style.color = "var(--unread-red)";
                document.getElementById('lock-title').innerText = "단말 접속 차단됨";
                document.getElementById('lock-desc').innerHTML = "중앙 관제 센터에 의해 인프라 접근 권한이 정지되었습니다.<br>보안 관리 책임자에게 확인하시기 바랍니다.";
            } else {
                lockOverlay.style.display = 'flex';
                document.getElementById('lock-icon').className = "fa-solid fa-user-lock";
                document.getElementById('lock-title').innerText = "단말 승인 대기 중";
                document.getElementById('lock-desc').innerHTML = `미승인 기기 탐지됨. 중앙 통제 타워에서 허가를 부여해야 가동됩니다.<br><small style="color:var(--text-muted);">기기 고유 코드: ${myId}</small>`;
            }
        });
    }

    function bindPresenceSystem() {
        const myStatusRef = database.ref(`kakao_style/status/${myId}`);
        database.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === false) return;
            myStatusRef.onDisconnect().set({ state: 'offline', last: firebase.database.ServerValue.TIMESTAMP })
                .then(() => {
                    myStatusRef.set({ state: 'online', last: firebase.database.ServerValue.TIMESTAMP });
                });
        });
    }

    function subscribeRoomsMeta() {
        database.ref('kakao_style/rooms').on('value', (snapshot) => {
            globalRoomsData = snapshot.val() || {};
            recomputeAllBadges();
            if (activeTab === 'chats') renderChatsTab();
        });
    }

    function recomputeAllBadges() {
        let totalUnread = 0;
        Object.keys(globalRoomsData).forEach(rId => {
            const room = globalRoomsData[rId];
            if (room.members && room.members[myId] === true) {
                database.ref(`kakao_style/read_state/${rId}/${myId}`).once('value', (snap) => {
                    const lastRead = snap.val() || 0;
                    let count = 0;
                    if (room.messages) {
                        Object.values(room.messages).forEach(m => {
                            if (m.senderId !== myId && (m.timestamp || 0) > lastRead && !m.deleted) count++;
                        });
                    }
                    if (rId === currentRoomId) count = 0;
                    unreadCache[rId] = count;
                    
                    const sum = Object.values(unreadCache).reduce((a, b) => a + b, 0);
                    const navBadge = document.getElementById('nav-chat-badge');
                    if (sum > 0) {
                        navBadge.innerText = sum > 99 ? '99+' : sum;
                        navBadge.style.display = 'flex';
                    } else {
                        navBadge.style.display = 'none';
                    }
                });
            }
        });
    }

    function switchTab(tabName) {
        activeTab = tabName;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById(`btn-tab-${tabName}`).classList.add('active');

        closeChatMobile();
        const container = document.getElementById('dynamic-list-container');
        container.innerHTML = '';

        if (tabName === 'friends') {
            document.getElementById('sidebar-main-title').innerText = "보안 주소록";
            renderFriendsTab(container);
        } else if (tabName === 'chats') {
            document.getElementById('sidebar-main-title').innerText = "초대 전용 대화방";
            renderChatsTab();
        }
    }

    function renderFriendsTab(container) {
        database.ref('kakao_style/users').on('value', (snapshot) => {
            if (activeTab !== 'friends') return;
            container.innerHTML = '';
            
            const users = snapshot.val() || {};
            let approvedUsers = Object.values(users).filter(u => u.status === 'approved');

            if (approvedUsers.length === 0) {
                container.innerHTML = '<div class="empty-placeholder">네트워크 내 활성화된<br>인원이 존재하지 않습니다.</div>';
                return;
            }

            approvedUsers.forEach(u => {
                const item = document.createElement('div');
                item.className = 'list-item';
                const safeName = escapeHtml(u.name);
                const isMe = u.id === myId;
                
                item.innerHTML = `
                    <div class="avatar-wrap">
                        <div class="profile-avatar">${safeName.substring(0, 1)}</div>
                        <span class="status-dot" id="dot-${u.id}"></span>
                    </div>
                    <div class="item-body">
                        <div class="item-name">${safeName} ${isMe ? '<span style="color:var(--admin-purple); font-size:0.75rem;">(본인 단말)</span>' : ''}</div>
                        <div class="item-preview">${u.id === myId ? '보안 통제망 소속 기기' : '승인 처리된 조직원 기기'}</div>
                    </div>
                `;
                container.appendChild(item);

                database.ref(`kakao_style/status/${u.id}/state`).on('value', (sSnap) => {
                    const el = document.getElementById(`dot-${u.id}`);
                    if (el) el.classList.toggle('online', sSnap.val() === 'online');
                });
            });
        });
    }

    /* ===================== [핵심 기능 기획 가동]: 초대받은 유저 전용 피드 렌더링 ===================== */
    function renderChatsTab() {
        if (activeTab !== 'chats') return;
        const container = document.getElementById('dynamic-list-container');
        container.innerHTML = '';

        const roomKeys = Object.keys(globalRoomsData);
        // 내 아이디가 members 리스트에 true로 들어간 방만 필터링 (보안 향상)
        const myRooms = roomKeys.filter(rId => globalRoomsData[rId].members && globalRoomsData[rId].members[myId] === true);

        if (myRooms.length === 0) {
            container.innerHTML = '<div class="empty-placeholder"><i class="fa-solid fa-eye-slash" style="font-size:1.5rem; margin-bottom:10px; display:block; opacity:0.5;"></i>초대 대기 중입니다.<br>소속되거나 허가받은 보안방 세션이 없습니다.</div>';
            return;
        }

        myRooms.forEach(rId => {
            const room = globalRoomsData[rId];
            const meta = room.meta || { roomTitle: "비밀 대화방", lastMessage: "보안 통신 대기 중", lastTime: "" };
            const unread = unreadCache[rId] || 0;
            const badgeHtml = unread > 0 ? `<span class="unread-badge">${unread}</span>` : '';

            const item = document.createElement('div');
            item.className = 'list-item';
            item.dataset.roomId = rId;

            item.innerHTML = `
                <div class="avatar-wrap">
                    <div class="profile-avatar" style="background:#e0f2fe; border-color:#bae6fd;">
                        <i class="fa-solid fa-key" style="color:#0284c7; font-size:0.9rem;"></i>
                    </div>
                </div>
                <div class="item-body">
                    <div class="item-header-line">
                        <span class="item-name" style="font-weight:700;">${escapeHtml(meta.roomTitle)}</span>
                        <span class="item-time">${escapeHtml(meta.lastTime)}</span>
                    </div>
                    <div class="item-bottom-line">
                        <span class="item-preview">${escapeHtml(meta.lastMessage)}</span>
                        ${badgeHtml}
                    </div>
                </div>
            `;

            item.onclick = () => joinChatRoom(rId, meta.roomTitle);
            container.appendChild(item);
        });

        document.querySelectorAll('.list-item').forEach(el => {
            el.classList.toggle('active', el.dataset.roomId === currentRoomId);
        });
    }

    /* ===================== 종단간 통제 룸 세션 연결 커널 ===================== */
    function joinChatRoom(roomId, roomTitle) {
        if (currentMsgAddedRef) currentMsgAddedRef.off();
        if (currentMsgChangedRef) currentMsgChangedRef.off();
        if (currentTypingRef) currentTypingRef.off();
        if (currentMembershipRef) currentMembershipRef.off();

        currentRoomId = roomId;
        currentRoomTitle = roomTitle;

        document.getElementById('no-room-placeholder').style.display = 'none';
        document.getElementById('active-room-title').innerText = roomTitle;

        const msgBox = document.getElementById('chat-messages-box');
        msgBox.innerHTML = '';
        lastRenderedDate = null;

        document.querySelector('.app-container').classList.add('chat-open');
        
        document.querySelectorAll('.list-item').forEach(el => {
            el.classList.toggle('active', el.dataset.roomId === roomId);
        });

        database.ref(`kakao_style/read_state/${roomId}/${myId}`).set(Date.now());
        if(unreadCache[roomId]) unreadCache[roomId] = 0;
        recomputeAllBadges();

        /* 멤버십 강제 박탈(추방) 실시간 차단 모니터링 모듈 */
        currentMembershipRef = database.ref(`kakao_style/rooms/${roomId}/members/${myId}`);
        currentMembershipRef.on('value', (mSnap) => {
            if (!mSnap.exists() && currentRoomId === roomId) {
                alert("해당 대화방에서 추방되었거나 권한이 박탈되어 세션이 즉시 해제됩니다.");
                closeChatMobile();
                document.getElementById('no-room-placeholder').style.display = 'flex';
                document.getElementById('active-room-title').innerText = "대화 세션을 선택하세요";
                document.getElementById('active-room-sub').innerText = "";
            }
        });

        /* 타이핑 구조 스캐폴딩 */
        let typingRow = document.getElementById('typing-indicator-row');
        if (!typingRow) {
            typingRow = document.createElement('div');
            typingRow.id = 'typing-indicator-row';
            typingRow.className = 'typing-row';
            typingRow.innerHTML = `
                <div class="typing-bubble"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>
                <div class="typing-label" id="typing-label"></div>
            `;
            msgBox.appendChild(typingRow);
        }

        currentTypingRef = database.ref(`kakao_style/rooms/${roomId}/typing`);
        currentTypingRef.on('value', (snap) => {
            const data = snap.val() || {};
            let typers = [];
            Object.keys(data).forEach(uid => {
                if (uid !== myId && data[uid].isTyping) typers.push(data[uid].name);
            });

            if (typers.length > 0) {
                typingRow.style.display = 'flex';
                document.getElementById('typing-label').innerText = `${typers.join(', ')}님이 메시지 작성 중..`;
                scrollChatBottom();
            } else {
                typingRow.style.display = 'none';
            }
        });

        // 실시간 스트리밍 메인 결합
        const messagesRef = database.ref(`kakao_style/rooms/${roomId}/messages`).limitToLast(60);
        
        currentMsgAddedRef = messagesRef.on('child_added', (snap) => {
            const val = snap.val();
            if (!val) return;
            database.ref(`kakao_style/read_state/${roomId}/${myId}`).set(val.timestamp || Date.now());
            renderMsgBubble(snap.key, val);
            if (val.senderId !== myId) playNotifySound();
        });

        currentMsgChangedRef = messagesRef.on('child_changed', (snap) => {
            const val = snap.val();
            const bubble = document.querySelector(`.bubble[data-msg-key="${snap.key}"]`);
            if (bubble) {
                if (val.deleted) {
                    bubble.className = "bubble deleted";
                    bubble.innerText = "삭제된 메시지입니다.";
                    const acts = bubble.closest('.msg-row').querySelector('.msg-actions');
                    if (acts) acts.remove();
                } else {
                    const txtNode = bubble.querySelector('.msg-text-content') || bubble;
                    txtNode.innerText = val.text;
                    if (!bubble.querySelector('.edited-tag')) {
                        const tag = document.createElement('span');
                        tag.className = 'edited-tag'; tag.innerText = '(수정됨)';
                        bubble.appendChild(tag);
                    }
                }
            }
        });
    }

    function closeChatMobile() {
        document.querySelector('.app-container').classList.remove('chat-open');
        currentRoomId = null;
        document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
    }

    /* ===================== 버블 디스플레이 및 입력 트랜잭션 ===================== */
    function renderMsgBubble(key, data) {
        const msgBox = document.getElementById('chat-messages-box');
        const typingRow = document.getElementById('typing-indicator-row');

        if (data.timestamp) {
            const mDate = new Date(data.timestamp).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            if (lastRenderedDate !== mDate) {
                lastRenderedDate = mDate;
                const div = document.createElement('div');
                div.className = 'date-divider'; div.innerText = mDate;
                if (typingRow) msgBox.insertBefore(div, typingRow); else msgBox.appendChild(div);
            }
        }

        if (document.getElementById(`msg-row-${key}`)) return;

        const row = document.createElement('div');
        row.id = `msg-row-${key}`;
        const type = data.senderId === myId ? 'sent' : 'received';
        row.className = `msg-row ${type}`;

        const safeName = escapeHtml(data.senderName);
        const safeText = escapeHtml(data.text);
        
        let html = '';
        if (type === 'received') html += `<div class="profile-avatar">${safeName.substring(0, 1)}</div>`;
        html += `<div class="msg-container">`;
        if (type === 'received') html += `<span class="msg-username">${safeName}</span>`;
        html += `<div class="msg-bubble-wrap">`;

        if (data.deleted) {
            html += `<div class="bubble deleted" data-msg-key="${key}">삭제된 메시지입니다.</div>`;
        } else {
            html += `<div class="bubble" data-msg-key="${key}">`;
            if (data.fileData) {
                html += `
                    <div class="img-card">
                        <img src="${data.fileData}" class="chat-img" onclick="zoomImg('${data.fileData}')" alt="이미지">
                        <a href="${data.fileData}" download="${escapeHtml(data.fileName)}" class="download-link"><i class="fa-solid fa-download"></i> 다운로드</a>
                    </div>`;
            } else {
                html += `<span class="msg-text-content">${safeText}</span>`;
            }
            if (data.isEdited) html += `<span class="edited-tag">(수정됨)</span>`;
            html += `</div>`;

            if (type === 'sent') {
                html += `
                    <div class="msg-actions">
                        ${!data.fileData ? `<button class="msg-action-btn" onclick="startEditMsg('${key}', '${safeText.replace(/'/g, "\\'")}')" title="수정"><i class="fa-solid fa-pen"></i></button>` : ''}
                        <button class="msg-action-btn" onclick="deleteKakaoMsg('${key}')" title="삭제"><i class="fa-solid fa-trash"></i></button>
                    </div>`;
            }
        }

        html += `
            <div class="msg-meta-col">
                <span class="msg-read-mark" data-read-key="${key}"></span>
                <span class="msg-time-stamp">${escapeHtml(data.time)}</span>
            </div>
        `;
        html += `</div></div>`;
        row.innerHTML = html;

        if (typingRow) msgBox.insertBefore(row, typingRow); else msgBox.appendChild(row);
        
        bindClosedReadMark(key, data.timestamp);
        scrollChatBottom();
    }

    function bindClosedReadMark(key, msgTimestamp) {
        if (!currentRoomId) return;
        database.ref(`kakao_style/rooms/${currentRoomId}/members`).once('value', (mSnap) => {
            const memberCount = Object.keys(mSnap.val() || {}).length;
            
            database.ref(`kakao_style/read_state/${currentRoomId}`).on('value', (readStatesSnap) => {
                const states = readStatesSnap.val() || {};
                let readCount = 0;
                Object.keys(states).forEach(uid => {
                    if (states[uid] >= msgTimestamp) readCount++;
                });
                
                const leftToRead = memberCount - readCount;
                const mark = document.querySelector(`[data-read-key="${key}"]`);
                if (mark) {
                    mark.innerText = leftToRead > 0 ? leftToRead : "";
                }
            });
        });
    }

    function sendKakaoMsg() {
        const input = document.getElementById('message-input');
        const val = input.value.trim();
        if (!val || !currentRoomId) return;

        const now = Date.now();
        const timeString = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });

        if (editingMsgKey) {
            database.ref(`kakao_style/rooms/${currentRoomId}/messages/${editingMsgKey}`).update({ text: val, isEdited: true });
            cancelEdit();
        } else {
            const payload = { senderId: myId, senderName: myName, text: val, time: timeString, timestamp: now };
            database.ref(`kakao_style/rooms/${currentRoomId}/messages`).push(payload);
            database.ref(`kakao_style/rooms/${currentRoomId}/meta`).set({ roomTitle: currentRoomTitle, lastMessage: val, lastTime: timeString, timestamp: now });
        }
        input.value = '';
        if (currentTypingRef) currentTypingRef.child(myId).set({ isTyping: false, name: myName });
    }

    function uploadPhoto(input) {
        const file = input.files[0];
        if (!file || !currentRoomId) return;
        if (file.size > 1.5 * 1024 * 1024) return alert("보안 유지 차원에서 1.5MB 이하 파일만 인젝션 가능합니다.");

        const label = document.querySelector('.file-label');
        label.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin"></i>`;

        const reader = new FileReader();
        reader.onload = (e) => {
            const now = Date.now();
            const timeString = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: true });
            
            database.ref(`kakao_style/rooms/${currentRoomId}/messages`).push({
                senderId: myId, senderName: myName, text: "📎 보안 파일 전송", fileData: e.target.result, fileName: file.name, time: timeString, timestamp: now
            });
            database.ref(`kakao_style/rooms/${currentRoomId}/meta`).set({ roomTitle: currentRoomTitle, lastMessage: "📎 고화질 사진을 공유했습니다.", lastTime: timeString, timestamp: now });
            label.innerHTML = `<i class="fa-regular fa-square-plus"></i>`;
        };
        reader.readAsDataURL(file);
    }

    function handleTyping() {
        if (!currentRoomId || !currentTypingRef) return;
        currentTypingRef.child(myId).set({ isTyping: true, name: myName });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            currentTypingRef.child(myId).set({ isTyping: false, name: myName });
        }, 1500);
    }

    function startEditMsg(key, text) {
        editingMsgKey = key;
        document.getElementById('edit-banner').style.display = 'flex';
        const input = document.getElementById('message-input');
        input.value = text; input.focus();
    }
    function cancelEdit() {
        editingMsgKey = null;
        document.getElementById('edit-banner').style.display = 'none';
        document.getElementById('message-input').value = '';
    }
    function deleteKakaoMsg(key) {
        if (confirm("이 유기적 대화 데이터를 중앙 서버에서 삭제 파쇄합니까?")) {
            database.ref(`kakao_style/rooms/${currentRoomId}/messages/${key}`).update({ deleted: true, text: "삭제된 메시지입니다." });
        }
    }

    function scrollChatBottom() { const b = document.getElementById('chat-messages-box'); b.scrollTop = b.scrollHeight; }
    function zoomImg(src) { document.getElementById('modal-img').src = src; document.getElementById('img-modal').style.display = 'flex'; }

    function changeMyName() {
        const target = prompt("변경할 보안 호출 코드명 지정:", myName);
        if (target && target.trim()) {
            myName = target.trim();
            localStorage.setItem('chat_username_v7', myName);
            document.getElementById('my-name-display').innerText = myName;
            document.getElementById('my-avatar-box').innerText = myName.substring(0, 1);
            database.ref(`kakao_style/users/${myId}`).update({ name: myName });
        }
    }

    /* ===================== [핵심 기능 기획 가동]: 개별 방 통제 및 실시간 초대 백오피스 타워 ===================== */
    function openAdminMode() {
        const pass = prompt("통제 타워 2중 검증 마스터 패스워드:");
        if (pass !== ADMIN_PASS) return alert("인증 권한이 부합하지 않습니다. 기기 락을 위협하지 마십시오.");

        document.getElementById('panel-chat-view').style.display = 'none';
        document.getElementById('panel-admin-view').style.display = 'flex';
        
        bindAdminMasterPanel();
    }

    function closeAdminMode() {
        document.getElementById('panel-admin-view').style.display = 'none';
        document.getElementById('panel-chat-view').style.display = 'flex';
        switchTab(activeTab);
    }

    function systemCreateRoom() {
        const titleInput = document.getElementById('new-room-title');
        const title = titleInput.value.trim();
        if(!title) return alert("보안방 제목을 설정해야 구조화가 가능합니다.");

        const newRoomId = "room_" + Date.now();
        
        // 개설과 동시에 최고 권한 관리자는 자동 멤버 가입 처리 진행
        database.ref(`kakao_style/rooms/${newRoomId}`).set({
            meta: { roomTitle: title, lastMessage: "초대받은 인원용 폐쇄 채널 가동됨.", lastTime: "--:--", timestamp: Date.now() },
            members: { [myId]: true }
        }).then(() => {
            alert(`[${title}] 초대형 보안방 개설이 완료되었으며 마스터 계정이 배정되었습니다.`);
            titleInput.value = '';
        });
    }

    function bindAdminMasterPanel() {
        // 단일 사용자 상태 구조 및 개별 대화방 멤버 크로스 관제 (Q1-B 및 초대 통제 결합)
        database.ref('kakao_style/users').on('value', (userSnapshot) => {
            const users = userSnapshot.val() || {};
            const approvedUsersArray = Object.values(users).filter(u => u.status === 'approved');
            
            const reqBox = document.getElementById('admin-user-requests');
            const appBox = document.getElementById('admin-approved-users');
            
            reqBox.innerHTML = ''; appBox.innerHTML = '';

            // 1. 단말기 인프라 신규 승인 뷰어
            Object.keys(users).forEach(uid => {
                const u = users[uid];
                const safeName = escapeHtml(u.name);
                
                if (u.status === 'pending') {
                    const div = document.createElement('div');
                    div.className = 'admin-list-item';
                    div.innerHTML = `
                        <span><b>${safeName}</b> (${uid})</span>
                        <div class="action-btn-set">
                            <button class="action-approve" onclick="controlUserStatus('${uid}', 'approved')">가입 승인</button>
                            <button class="action-block" onclick="controlUserStatus('${uid}', 'blocked')">영구 차단</button>
                        </div>`;
                    reqBox.appendChild(div);
                } else {
                    const div = document.createElement('div');
                    div.className = 'admin-list-item';
                    div.innerHTML = `
                        <span><b>${safeName}</b> [${u.status.toUpperCase()}]</span>
                        <div class="action-btn-set">
                            ${u.status === 'approved' ? `<button class="action-block" onclick="controlUserStatus('${uid}', 'blocked')">네트워크 차단</button>` : `<button class="action-approve" onclick="controlUserStatus('${uid}', 'approved')">차단 해제 복구</button>`}
                        </div>`;
                    appBox.appendChild(div);
                }
            });
            if(reqBox.innerHTML === '') reqBox.innerHTML = '<div style="font-size:0.8rem; color:gray; text-align:center; padding:10px;">가입 승인 대기중인 기기가 없습니다.</div>';

            // 2. 전체 및 개별 방 마스터 제어 대시보드 리액터 가동
            database.ref('kakao_style/rooms').on('value', (roomSnapshot) => {
                const rooms = roomSnapshot.val() || {};
                const roomMgrBox = document.getElementById('admin-room-management');
                roomMgrBox.innerHTML = '';

                Object.keys(rooms).forEach(rId => {
                    const room = rooms[rId];
                    const meta = room.meta || { roomTitle: "정밀 암호방" };
                    const roomMembers = room.members || {};

                    const card = document.createElement('div');
                    card.className = 'admin-room-control-card';

                    // 현시점 소속 멤버 맵 매핑 및 개별 추방(Kick) UI 어펜드
                    let memberTagsHtml = '';
                    Object.keys(roomMembers).forEach(mUid => {
                        const targetUserObj = users[mUid];
                        const displayMemberName = targetUserObj ? targetUserObj.name : "비활성 유저";
                        memberTagsHtml += `
                            <span class="admin-member-tag">
                                ${escapeHtml(displayMemberName)}
                                <i class="fa-solid fa-circle-xmark" onclick="systemKickUser('${rId}', '${mUid}')" style="cursor:pointer; color:var(--unread-red); font-size:0.85rem;"></i>
                            </span>`;
                    });

                    // 아직 이 방에 가입되지 않은 승인 유저 대상 실시간 초대 셀렉트박스 빌딩
                    let inviteSelectOptions = '<option value="">-- 초대할 요원 기기 선택 --</option>';
                    approvedUsersArray.forEach(au => {
                        if (!roomMembers[au.id]) {
                            inviteSelectOptions += `<option value="${au.id}">${escapeHtml(au.name)} (${au.id})</option>`;
                        }
                    });

                    card.innerHTML = `
                        <div style="display:flex; justify-content:between; align-items:center; margin-bottom:10px; border-bottom:1px solid var(--border-color); padding-bottom:6px;">
                            <span style="flex:1;"><i class="fa-solid fa-folder-closed" style="color:var(--admin-purple); margin-right:6px;"></i><b style="font-size:0.92rem; color:var(--text-main);">${escapeHtml(meta.roomTitle)}</b> <small style="color:var(--text-muted); font-size:0.7rem;">(${rId})</small></span>
                            <button class="action-block" style="padding:3px 8px; font-size:0.72rem; border-radius:5px;" onclick="systemExplodeRoom('${rId}')">방 영구 파괴</button>
                        </div>
                        <div style="margin-bottom:10px;">
                            <span style="font-size:0.75rem; color:var(--text-muted); display:block; margin-bottom:4px;"><i class="fa-solid fa-users"></i> 현재 참여 소속 멤버:</span>
                            <div style="display:flex; flex-wrap:wrap; gap:6px;">${memberTagsHtml || '<span style="color:#94a3b8; font-size:0.75rem;">소속된 인원이 없습니다.</span>'}</div>
                        </div>
                        <div class="admin-input-group" style="margin-top:8px; gap:4px;">
                            <select id="invite-select-${rId}" class="admin-input" style="padding:4px 8px; height:32px; font-size:0.8rem;">${inviteOptionsHtml = inviteSelectOptions}</select>
                            <button class="action-approve" style="height:32px; font-size:0.8rem; padding:0 12px; border-radius:6px;" onclick="systemInviteUser('${rId}')"><i class="fa-solid fa-user-plus"></i> 초대</button>
                        </div>
                    `;
                    roomMgrBox.appendChild(card);
                });
                if(Object.keys(rooms).length === 0) roomMgrBox.innerHTML = '<div style="font-size:0.8rem; color:gray; text-align:center; padding:10px;">인프라 내에 생성된 통제 세션이 전무합니다.</div>';
            });
        });
    }

    function controlUserStatus(uid, nextStatus) {
        database.ref(`kakao_style/users/${uid}`).update({ status: nextStatus })
            .then(() => alert(`기기 상태 코드가 [${nextStatus}] 격리/승인 갱신되었습니다.`));
    }

    /* 관리자 전용 실시간 강제 초대 엔진 */
    function systemInviteUser(roomId) {
        const select = document.getElementById(`invite-select-${roomId}`);
        const targetUid = select.value;
        if (!targetUid) return alert("초대 타겟 단말 요원을 선택해 주십시오.");

        database.ref(`kakao_style/rooms/${roomId}/members/${targetUid}`).set(true)
            .then(() => alert("해당 유저의 단말기를 대화방 멤버십에 정식 편입 처리했습니다."));
    }

    /* 관리자 전용 개별 방 멤버 추방 엔진 */
    function systemKickUser(roomId, targetUid) {
        if (confirm("해당 유저를 이 보안방 세션에서 즉시 추방 탈퇴 조치합니까?")) {
            database.ref(`kakao_style/rooms/${roomId}/members/${targetUid}`).remove()
                .then(() => alert("해당 단말 요원의 소속 권한을 파기 추방했습니다."));
        }
    }

    function systemExplodeRoom(id) {
        if (confirm("이 폐쇄방의 모든 데이터 및 메시지 내역을 영구 소멸 파괴하시겠습니까?")) {
            database.ref(`kakao_style/rooms/${id}`).remove()
                .then(() => alert("해당 통제 세션이 우주에서 소멸되었습니다."));
        }
    }

    initApplication();
</script>
</body>
</html>
